<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexVUE — Cast Receiver</title>
<!--
  Custom Chromecast / Cast Web Receiver for NexVUE.
  Speaks WHEP to the edge (same H.264 + Opus path as index.html) — Chromecast
  cannot cast a browser MediaStream, so the STB connects itself.

  Launch data (custom namespace urn:x-cast:com.nexvue.whep):
    { "whepBase": "https://edge:8889", "path": "ch0", "rendition": "hi"|"lo",
      "captions": true|false }

  Direct test (no Cast session): open with query params, e.g.
    cast-receiver.html?whepBase=https://10.0.0.5:8889&path=ch0&captions=1
-->
<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script src="nexvue-captions.js"></script>
<style>
  :root {
    --bg: #000; --text: #d6dde6; --dim: #7d8a99; --ok: #4cc38a; --bad: #e5484d; --acc: #56c4f5;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace; }
  body { display: flex; flex-direction: column; }
  #hud {
    position: absolute; left: 16px; top: 16px; z-index: 2;
    color: var(--dim); text-shadow: 0 1px 3px #000; pointer-events: none;
  }
  #hud .title { color: var(--acc); font-weight: 600; font-size: 16px; }
  #hud .state.ok { color: var(--ok); }
  #hud .state.bad { color: var(--bad); }
  #stage { position: relative; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
  video {
    width: 100%; height: 100%; object-fit: contain; background: #000; display: block;
  }
  #cc-overlay {
    position: absolute; left: 8%; right: 8%; bottom: 10%; z-index: 1;
    text-align: center; pointer-events: none;
    font: 600 3.2vmin/1.35 ui-monospace, "Cascadia Mono", Consolas, monospace;
    color: #fff; text-shadow: 0 1px 2px #000, 0 0 6px #000;
    white-space: pre-line; background: rgba(0,0,0,.55);
    padding: 0.2em 0.55em; border-radius: 2px;
  }
  #cc-overlay[hidden] { display: none; }
  #tap {
    display: none; position: absolute; inset: 0; z-index: 3;
    background: rgba(0,0,0,.55); color: var(--text); border: 0; cursor: pointer;
    font: inherit; font-size: 18px;
  }
  #tap.show { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="hud">
  <div class="title">NexVUE</div>
  <div id="label">waiting for cast…</div>
  <div id="state" class="state">idle</div>
</div>
<div id="stage">
  <video id="video" autoplay playsinline></video>
  <div id="cc-overlay" hidden aria-live="polite"></div>
</div>
<button type="button" id="tap" class="show">Tap for audio</button>

<script>
"use strict";
(() => {
  const NS = "urn:x-cast:com.nexvue.whep";
  const video = document.getElementById("video");
  const labelEl = document.getElementById("label");
  const stateEl = document.getElementById("state");
  const tapEl = document.getElementById("tap");

  let pc = null;
  let intentional = false;
  let reconnectTimer = null;
  let reconnectAttempt = 0;
  let currentSessionId = null;
  let current = { whepBase: "", path: "", rendition: "hi", captions: false };
  const ccOverlay = document.getElementById("cc-overlay");
  let captionsOn = false;
  let lastCue = { text: "", clear: true, seq: 0, service: "CC1" };
  function paintCaptions() {
    NexVueCaptions.renderOverlay(ccOverlay, lastCue, captionsOn);
  }
  const captionClient = NexVueCaptions.connect((cue) => {
    lastCue = cue;
    paintCaptions();
  });

  const RECONNECT_BASE_MS = 2000;
  const RECONNECT_MAX_MS = 30000;

  function setState(text, cls) {
    stateEl.textContent = text;
    stateEl.className = "state" + (cls ? " " + cls : "");
  }

  function pathFor(base, rend) {
    return rend === "lo" ? `${base}lo` : base;
  }

  function parseWhepSessionId(res) {
    const loc = res.headers.get("Location") || res.headers.get("location") || "";
    const m = String(loc).match(
      /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i
    );
    return m ? m[0] : null;
  }

  function decodeKickReason(s) {
    return String(s)
      .replace(/&quot;/g, '"')
      .replace(/&#039;/g, "'")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&amp;/g, "&");
  }

  async function checkKicked(sessionId) {
    const q = new URLSearchParams({ action: "kick_check" });
    if (sessionId) q.set("session_id", sessionId);
    const res = await fetch(`nexvue-ops.php?${q}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return { kicked: !!data.kicked, reason: data.reason || "" };
  }

  function applyKicked(reason) {
    intentional = true;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (pc) { pc.close(); pc = null; }
    video.srcObject = null;
    currentSessionId = null;
    const msg = decodeKickReason(reason || "");
    setState(msg ? `removed by administrator — ${msg}` : "removed by administrator", "bad");
  }

  function closeSession() {
    intentional = true;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (pc) { pc.close(); pc = null; }
    video.srcObject = null;
    currentSessionId = null;
  }

  function setCaptionsEnabled(on, channelBase) {
    captionsOn = !!on;
    if (captionsOn && channelBase) {
      captionClient.setChannel(channelBase);
    } else {
      captionClient.setChannel(null);
    }
    paintCaptions();
  }

  function scheduleReconnect() {
    if (intentional || reconnectTimer || !current.whepBase || !current.path) return;
    reconnectAttempt++;
    const delay = Math.min(RECONNECT_BASE_MS * 2 ** (reconnectAttempt - 1), RECONNECT_MAX_MS);
    setState(`reconnecting in ${Math.round(delay / 1000)}s…`, "bad");
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      if (intentional) return;
      openSession(current.whepBase, pathFor(current.path, current.rendition));
    }, delay);
  }

  async function maybeReconnect() {
    if (intentional || !current.whepBase || !current.path) return;
    const sid = currentSessionId;
    try {
      const result = await checkKicked(sid);
      if (result.kicked) {
        applyKicked(result.reason);
        return;
      }
    } catch (e) { /* heal as usual */ }
    scheduleReconnect();
  }

  async function openSession(whepBase, path) {
    closeSession();
    intentional = false;
    const base = String(whepBase || "").replace(/\/+$/, "");
    const url = `${base}/${path}/whep`;
    labelEl.textContent = path;
    setState(`connecting ${path}…`);

    pc = new RTCPeerConnection();
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });
    pc.ontrack = (ev) => {
      try { ev.receiver.playoutDelayHint = 0; } catch (e) { /* unsupported */ }
      try { ev.receiver.jitterBufferTarget = 0; } catch (e) { /* unsupported */ }
      if (!video.srcObject) video.srcObject = ev.streams[0];
      video.play().catch(() => { tapEl.classList.add("show"); });
    };
    pc.onconnectionstatechange = () => {
      if (!pc) return;
      if (pc.connectionState === "connected") {
        setState("connected", "ok");
        reconnectAttempt = 0;
      } else if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
        setState(pc.connectionState, "bad");
        if (!intentional) maybeReconnect();
      }
    };

    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await new Promise((resolve) => {
        if (pc.iceGatheringState === "complete") return resolve();
        const check = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", check);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", check);
        setTimeout(resolve, 2000);
      });

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/sdp" },
        body: pc.localDescription.sdp,
      });
      if (!res.ok) throw new Error(`WHEP HTTP ${res.status}`);
      currentSessionId = parseWhepSessionId(res);
      await pc.setRemoteDescription({ type: "answer", sdp: await res.text() });
    } catch (err) {
      const sid = currentSessionId;
      setState(`error: ${err.message}`, "bad");
      closeSession();
      currentSessionId = sid;
      intentional = false;
      if (!intentional) maybeReconnect();
    }
  }

  function applyLaunch(data) {
    if (!data || typeof data !== "object") return;
    const whepBase = data.whepBase || data.whep_base || "";
    let path = data.path || "";
    const rendition = data.rendition === "lo" ? "lo" : "hi";
    const captions = data.captions === true || data.captions === 1
      || data.captions === "1" || data.captions === "true";
    if (!path && data.channel) path = String(data.channel);
    if (path.endsWith("lo") && rendition === "hi") {
      // allow explicit full path
    }
    if (!whepBase || !path) {
      setState("missing whepBase/path", "bad");
      return;
    }
    // Normalize: store channel base without lo suffix when rendition is separate
    let channelBase = path;
    if (path.endsWith("lo") && path.length > 2) {
      channelBase = path.slice(0, -2);
      current.rendition = "lo";
    } else {
      current.rendition = rendition;
    }
    current.whepBase = whepBase.replace(/\/+$/, "");
    current.path = channelBase.replace(/^\/+/, "");
    current.captions = captions;
    setCaptionsEnabled(captions, current.path);
    openSession(current.whepBase, pathFor(current.path, current.rendition));
  }

  tapEl.addEventListener("click", () => {
    video.muted = false;
    video.play().then(() => tapEl.classList.remove("show")).catch(() => {});
  });

  // Query-string bring-up (desktop test without a Cast session).
  const qs = new URLSearchParams(location.search);
  if (qs.get("whepBase") && qs.get("path")) {
    applyLaunch({
      whepBase: qs.get("whepBase"),
      path: qs.get("path"),
      rendition: qs.get("rendition") || "hi",
      captions: qs.get("captions") || "0",
    });
  }

  // Cast Receiver CAF — optional when opened as a normal page for testing.
  function startCastReceiver() {
    if (typeof cast === "undefined" || !cast.framework) return;
    const context = cast.framework.CastReceiverContext.getInstance();
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;
    options.customNamespaces = {};
    options.customNamespaces[NS] = cast.framework.system.MessageType.JSON;

    context.addCustomMessageListener(NS, (event) => {
      applyLaunch(event.data);
    });

    context.addEventListener(
      cast.framework.system.EventType.SENDER_CONNECTED,
      () => setState("sender connected")
    );
    context.addEventListener(
      cast.framework.system.EventType.SENDER_DISCONNECTED,
      () => {
        // Keep playing if already connected; only idle if never launched.
        if (!current.whepBase) setState("sender disconnected", "bad");
      }
    );

    context.start(options);
    setState("cast receiver ready");
  }

  if (document.readyState === "loading") {
    window.addEventListener("load", startCastReceiver);
  } else {
    startCastReceiver();
  }
})();
</script>
</body>
</html>
