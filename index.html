<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexVUE — Player</title>
<!--
  Phase 1 bring-up tool (v3).
  Adds: Auto/HI/LO rendition selection with stats-driven auto-switching.
        LO availability is detected live from the MediaMTX API (chNlo ready).
  Auto-switch policy (reference implementation for the Phase 2 portal player):
    - down HI->LO: packet-loss rate >3% for 3 consecutive seconds
    - up   LO->HI: loss <0.5% for 20 consecutive seconds
    - 10s cooldown between switches to prevent flapping
  WebRTC has no rendition manifest — the browser cannot do this itself; every
  switch is a deliberate reconnect to the other MediaMTX path.
-->
<style>
  :root {
    --bg: #14181d; --panel: #1d232b; --edge: #2c3542;
    --text: #d6dde6; --dim: #7d8a99; --ok: #4cc38a; --bad: #e5484d; --acc: #56c4f5;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 16px; padding-bottom: 56px; background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .topnav {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    margin: -16px -16px 16px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--edge);
    flex-shrink: 0;
  }
  .topnav .brand {
    background: none; border: none; color: var(--acc); font: inherit; font-weight: 600;
    font-size: 15px; padding: 6px 12px 6px 0; margin-right: 4px; cursor: pointer;
  }
  .topnav .brand:hover { text-decoration: underline; }
  .topnav a {
    color: var(--dim); text-decoration: none; padding: 6px 12px;
    border-radius: 4px; border: 1px solid transparent;
  }
  .topnav a:hover { color: var(--text); border-color: var(--edge); }
  .topnav a.active {
    background: var(--acc); color: #08131a; border-color: var(--acc); font-weight: 600;
  }
  .bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 12px; flex-shrink: 0;
  }
  input, button {
    background: var(--panel); color: var(--text); border: 1px solid var(--edge);
    border-radius: 4px; padding: 7px 10px; font: inherit;
  }
  input:focus, button:focus-visible { outline: 2px solid var(--acc); outline-offset: 1px; }
  input#host { width: 260px; }
  button { cursor: pointer; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.ch.active, button.tgl.active, button.q.active {
    background: var(--acc); color: #08131a; border-color: var(--acc); font-weight: 600;
  }
  /* Input status dot on each channel button, fed by the status daemon */
  button.ch::before {
    content: ""; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 6px; background: var(--dim);
    vertical-align: 1px;
  }
  button.ch.sig-ok::before   { background: var(--ok); }
  button.ch.sig-lost::before { background: var(--bad); }
  button#disconnect { border-color: var(--bad); color: var(--bad); }
  #state { color: var(--dim); }
  #state.ok { color: var(--ok); }
  #state.bad { color: var(--bad); }
  .qlabel { color: var(--dim); }
  /* Video grows with the window; on ultrawide, letterbox and center horizontally. */
  .stage {
    flex: 1; min-height: 0; width: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  .videowrap {
    width: min(1280px, 100%);
    max-height: 100%;
    aspect-ratio: 16 / 9;
    margin-inline: auto;
  }
  video {
    width: 100%; height: 100%; display: block; object-fit: contain;
    background: #000; border: 1px solid var(--edge); border-radius: 4px;
  }
  /* Mirror/flip transforms are applied inline via JS (not CSS classes) so they
     survive fullscreen — the browser's fullscreen styling can override a
     stylesheet `transform`, but not an inline one. Fullscreen targets the
     wrapper div, not the video, so the video's transform is never touched. */
  .videowrap:fullscreen { display: flex; align-items: center; background: #000; }
  .videowrap:-webkit-full-screen { display: flex; align-items: center; background: #000; }
  .videowrap:fullscreen video, .videowrap:-webkit-full-screen video { max-height: 100vh; }
  .stats-drawer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--panel); border-top: 1px solid var(--edge);
  }
  .stats-drawer #stats-toggle {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; border: none; border-radius: 0; padding: 10px 16px;
    color: var(--dim); font: inherit; cursor: pointer;
  }
  .stats-drawer #stats-toggle:hover { color: var(--text); }
  .stats-drawer .caret { display: inline-block; transition: transform .15s ease; }
  .stats-drawer.open .caret { transform: rotate(180deg); }
  .stats-drawer .stats-panel {
    display: none; max-height: 40vh; overflow: auto; padding: 0 16px 16px;
  }
  .stats-drawer.open .stats-panel { display: block; }
  #stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px; max-width: 1280px; margin: 0 auto;
  }
  .stat { background: var(--bg); border: 1px solid var(--edge); border-radius: 4px; padding: 8px 10px; }
  .stat .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .stat .v { font-size: 16px; margin-top: 2px; }
  .qr-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.6); align-items: center; justify-content: center; padding: 16px;
  }
  .qr-modal.open { display: flex; }
  .qr-panel {
    background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
    padding: 20px; max-width: 360px; width: 100%; text-align: center;
  }
  .qr-panel h2 { margin: 0 0 12px; font-size: 14px; color: var(--acc); }
  .qr-panel canvas {
    image-rendering: pixelated; width: 220px; height: 220px;
    background: #fff; border-radius: 4px;
  }
  .qr-url {
    word-break: break-all; color: var(--dim); font-size: 12px;
    margin: 12px 0; text-align: left;
  }
  .qr-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<nav class="topnav" aria-label="NexVUE">
  <button type="button" class="brand" id="brand" title="Show page URL as QR code">NexVUE</button>
  <a href="/index.html" class="active">Player</a>
  <a href="/multiview.html">Multiview</a>
  <a href="/metrics.html">Metrics</a>
  <a href="/services.html">Services</a>
  <a href="/channels.html">Channels</a>
</nav>

<div class="bar">
  <input id="host" placeholder="(auto)" aria-label="Edge WHEP base URL — leave blank to use this page's host" title="Leave blank to auto-use the address you loaded this page from. Override to point at a different edge, e.g. http://10.0.0.5:8889">
  <span id="channels"></span>
  <button id="disconnect">Disconnect</button>
  <span id="state">idle</span>
</div>

<div class="bar">
  <span class="qlabel">quality:</span>
  <button id="q-auto" class="q active">Auto</button>
  <button id="q-hi" class="q">HI</button>
  <button id="q-lo" class="q" disabled title="channel has no LO rendition">LO</button>
  <span style="border-left:1px solid var(--edge);height:20px"></span>
  <button id="mirror" class="tgl" title="Reflect left-right (confidence monitor)">Mirror ↔</button>
  <button id="flip" class="tgl" title="Reflect top-bottom (inverted mounts)">Flip ↕</button>
  <button id="fs" class="tgl" title="Fullscreen (keeps mirror/flip)">⛶ Fullscreen</button>
</div>

<div class="stage">
  <div class="videowrap">
    <video id="video" autoplay playsinline controls muted></video>
    <!-- muted: browsers block un-muted autoplay; unmute via controls once playing -->
  </div>
</div>

<div id="stats-drawer" class="stats-drawer">
  <button type="button" id="stats-toggle" aria-expanded="false" aria-controls="stats">
    <span class="caret" aria-hidden="true">▴</span> Session metrics
  </button>
  <div class="stats-panel" id="stats-panel">
    <div id="stats">
      <div class="stat"><div class="k">Rendition</div><div class="v" id="s-rend">—</div></div>
      <div class="stat"><div class="k">Resolution / FPS</div><div class="v" id="s-res">—</div></div>
      <div class="stat"><div class="k">My video bitrate</div><div class="v" id="s-vbr">—</div></div>
      <div class="stat"><div class="k">RTT (ICE)</div><div class="v" id="s-rtt">—</div></div>
      <div class="stat"><div class="k">Jitter buffer</div><div class="v" id="s-jb">—</div></div>
      <div class="stat"><div class="k">Loss (1s)</div><div class="v" id="s-loss">—</div></div>
      <div class="stat"><div class="k">Frames dropped</div><div class="v" id="s-drop">—</div></div>
      <div class="stat"><div class="k">Viewers (path)</div><div class="v" id="s-viewers">—</div></div>
      <div class="stat"><div class="k">Path egress</div><div class="v" id="s-chout">—</div></div>
      <div class="stat"><div class="k">Edge egress (all)</div><div class="v" id="s-allout">—</div></div>
      <div class="stat"><div class="k">SDI input</div><div class="v" id="s-input">—</div></div>
      <div class="stat"><div class="k">Reference</div><div class="v" id="s-ref">—</div></div>
      <div class="stat"><div class="k">Screen awake</div><div class="v" id="s-wake">—</div></div>
    </div>
  </div>
</div>

<div id="qr-modal" class="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-title" hidden>
  <div class="qr-panel">
    <h2 id="qr-title">Open on phone</h2>
    <canvas id="qr-canvas" width="220" height="220" aria-hidden="true"></canvas>
    <div class="qr-url" id="qr-url"></div>
    <div class="qr-actions">
      <button type="button" id="qr-copy">Copy URL</button>
      <button type="button" id="qr-close">Close</button>
    </div>
  </div>
</div>

<script src="nexvue-qr.js"></script>
<script>
"use strict";
(() => {
  const $ = id => document.getElementById(id);
  const video = $("video"), stateEl = $("state");

  // ---- Session / quality state -------------------------------------------------
  let pc = null, statsTimer = null, apiTimer = null;
  let currentBase = null;       // e.g. "ch3" (channel identity)
  let currentPath = null;       // e.g. "ch3" or "ch3lo" (stream being watched)
  let qualityMode = "auto";     // "auto" | "manual"
  let rendition = "hi";         // "hi" | "lo" (current or desired)
  let loAvailable = false;      // does currentBase publish a lo path?
  let prevBytes = 0, prevTs = 0;
  let prevLost = 0, prevRecv = 0, haveLossBaseline = false;
  let badSeconds = 0, goodSeconds = 0, lastSwitchMs = 0;
  let prevApi = null;

  // Auto-switch policy constants (mirror these in the Phase 2 portal player)
  const DOWN_LOSS = 0.03, DOWN_AFTER_S = 3;
  const UP_LOSS = 0.005, UP_AFTER_S = 20;
  const SWITCH_COOLDOWN_MS = 10000;

  // Service ports on the edge host. The page is served by Apache (port 80/443)
  // but the three services live on their own ports on the SAME host — so we
  // derive every URL from the hostname used to load the page, ignoring the
  // page's own port. One edit here if a port ever changes.
  const PORT = { whep: 8889, api: 9997, status: 9998 };
  // Match the PAGE's own scheme. If Apache is served over HTTPS, the browser
  // will block any fetch to plain HTTP as mixed content — so once the page is
  // HTTPS, WHEP/API/status must be too (MediaMTX webrtcEncryption: yes, and
  // the status daemon's NEXVUE_STATUS_TLS_CERT/_KEY, both set to match).
  const PROTO = location.protocol === "https:" ? "https:" : "http:";

  // Auto-discovered once at load. Falls back to localhost when opened as a
  // file:// (no hostname), so bring-up straight from disk still works.
  const EDGE_HOST = (location.hostname && location.hostname.length)
    ? location.hostname : "127.0.0.1";

  function edgeUrl(service) {
    return `${PROTO}//${EDGE_HOST}:${PORT[service]}`;
  }

  // Show the auto-discovered WHEP URL as the host-field placeholder so the
  // user can see exactly what "auto" resolves to (and that it followed the
  // address they loaded the page from).
  document.addEventListener("DOMContentLoaded", () => {
    const h = $("host");
    if (h) h.placeholder = edgeUrl("whep");
  });

  function setState(text, cls) {
    stateEl.textContent = text;
    stateEl.className = cls || "";
  }

  // Base for WHEP requests — the host field allows a manual override (e.g.
  // pointing the page at a different edge), otherwise the discovered host.
  function whepBase() {
    const override = $("host").value.trim().replace(/\/+$/, "");
    return override || edgeUrl("whep");
  }

  // API and status live on the SAME host as WHEP but different ports. Derive
  // them from whatever host WHEP is currently using, so a manual override in
  // the host field propagates to all three services in lockstep.
  function serviceBase(service) {
    try {
      const host = new URL(whepBase()).hostname;
      return `${PROTO}//${host}:${PORT[service]}`;
    } catch { return edgeUrl(service); }
  }

  function pathFor(rend) {
    return rend === "lo" ? `${currentBase}lo` : currentBase;
  }

  function updateQualityUI() {
    $("q-auto").classList.toggle("active", qualityMode === "auto");
    $("q-hi").classList.toggle("active", qualityMode === "manual" && rendition === "hi");
    $("q-lo").classList.toggle("active", qualityMode === "manual" && rendition === "lo");
    $("q-lo").disabled = !loAvailable;
    $("s-rend").textContent = currentPath
      ? `${rendition.toUpperCase()}${qualityMode === "auto" ? " (auto)" : ""}` : "—";
  }

  // ---- Long-running session resilience -------------------------------------------
  // For unattended multi-hour playback (wall monitors, 8-15h shifts): the
  // connection must recover itself from transient network blips without a
  // human noticing a "failed" status text, and the display must not sleep.
  let intentionalDisconnect = false;   // true only for user-initiated teardown
  let reconnectTimer = null;
  let reconnectAttempt = 0;
  const RECONNECT_BASE_MS = 2000;      // first retry after 2s
  const RECONNECT_MAX_MS = 30000;      // backoff caps at 30s between attempts
  let wakeLock = null;

  async function acquireWakeLock() {
    if (!("wakeLock" in navigator)) { $("s-wake").textContent = "unsupported"; return; }
    if (wakeLock) return;   // already held, nothing to do
    try {
      wakeLock = await navigator.wakeLock.request("screen");
      $("s-wake").textContent = "on";
      $("s-wake").style.color = "var(--ok)";
      wakeLock.addEventListener("release", () => {
        wakeLock = null;
        $("s-wake").textContent = "released";
        $("s-wake").style.color = "var(--dim)";
      });
    } catch (e) {
      $("s-wake").textContent = "failed";
      $("s-wake").style.color = "var(--bad)";
    }
  }
  // Wake locks are released by the browser whenever the tab is hidden and
  // must be re-acquired on return — otherwise a monitor that gets alt-tabbed
  // once, even briefly, permanently loses its stay-awake behavior.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && currentBase && !wakeLock) {
      acquireWakeLock();
    }
  });

  function scheduleReconnect(base, rend) {
    if (intentionalDisconnect || reconnectTimer) return;
    reconnectAttempt++;
    const delay = Math.min(RECONNECT_BASE_MS * 2 ** (reconnectAttempt - 1), RECONNECT_MAX_MS);
    setState(`reconnecting in ${Math.round(delay / 1000)}s (attempt ${reconnectAttempt})…`, "bad");
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      if (intentionalDisconnect || !currentBase) return;
      openSession(pathFor(rend));
    }, delay);
  }


  function closeSession() {
    if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
    if (apiTimer) { clearInterval(apiTimer); apiTimer = null; }
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (pc) { pc.close(); pc = null; }
    video.srcObject = null;
    currentPath = null;
    prevBytes = 0; prevTs = 0;
    prevLost = 0; prevRecv = 0; haveLossBaseline = false;
    badSeconds = 0; goodSeconds = 0;
    prevApi = null;
  }

  function teardown() {
    intentionalDisconnect = true;
    closeSession();
    currentBase = null;
    loAvailable = false;
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
    $("s-wake").textContent = "—"; $("s-wake").style.color = "";
    ["s-viewers", "s-chout", "s-allout"].forEach(id => $(id).textContent = "—");
    document.querySelectorAll("button.ch").forEach(b => b.classList.remove("active"));
    updateQualityUI();
  }

  async function openSession(path) {
    closeSession();
    intentionalDisconnect = false;   // a new session is starting; arm auto-reconnect
    currentPath = path;
    setState(`connecting ${path}…`);
    updateQualityUI();

    const url = `${whepBase()}/${path}/whep`;

    pc = new RTCPeerConnection();
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });
    pc.ontrack = ev => {
      // Minimal receive buffering — the biggest LAN latency knob. Both hints
      // set because browser support differs.
      try { ev.receiver.playoutDelayHint = 0; } catch (e) { /* unsupported */ }
      try { ev.receiver.jitterBufferTarget = 0; } catch (e) { /* unsupported */ }
      if (!video.srcObject) video.srcObject = ev.streams[0];
    };
    pc.onconnectionstatechange = () => {
      if (!pc) return;
      if (pc.connectionState === "connected") {
        setState(`connected ${path}`, "ok");
        reconnectAttempt = 0;               // link is good again — reset backoff
        acquireWakeLock();
      } else if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
        setState(pc.connectionState, "bad");
        // Only auto-recover from an UNEXPECTED drop — not a user-initiated
        // disconnect/channel-switch/quality-switch, which already have their
        // own deliberate teardown+reopen paths.
        if (!intentionalDisconnect && currentBase) {
          scheduleReconnect(currentBase, rendition);
        }
      }
    };

    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await new Promise(resolve => {
        if (pc.iceGatheringState === "complete") return resolve();
        const check = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", check);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", check);
        setTimeout(resolve, 2000);
      });

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/sdp" },
        body: pc.localDescription.sdp
      });
      if (!res.ok) throw new Error(`WHEP endpoint returned ${res.status}`);
      await pc.setRemoteDescription({ type: "answer", sdp: await res.text() });

      statsTimer = setInterval(pollRtcStats, 1000);
      apiTimer = setInterval(pollApiStats, 2000);
      pollApiStats();
    } catch (err) {
      setState(`error: ${err.message}`, "bad");
      closeSession();
      updateQualityUI();
    }
  }

  function connectChannel(base, btn) {
    teardown();
    currentBase = base;
    btn.classList.add("active");
    // In auto mode always start on HI; the stats loop will step down if the
    // link can't carry it. Manual LO is honored if the path exists.
    if (qualityMode === "auto") rendition = "hi";
    if (rendition === "lo" && !loAvailable) rendition = "hi";
    openSession(pathFor(rendition));
  }

  function switchRendition(newRend, reason) {
    if (!currentBase || newRend === rendition) return;
    rendition = newRend;
    lastSwitchMs = performance.now();
    console.info(`[player] switching to ${newRend.toUpperCase()} (${reason})`);
    openSession(pathFor(newRend));
  }

  // ---- Per-second receiver stats + auto-switch policy -----------------------------
  async function pollRtcStats() {
    if (!pc) return;
    const report = await pc.getStats();
    let lossRate = null;

    report.forEach(s => {
      if (s.type === "inbound-rtp" && s.kind === "video") {
        $("s-res").textContent =
          (s.frameWidth ? `${s.frameWidth}x${s.frameHeight}` : "—") +
          (s.framesPerSecond ? ` @ ${s.framesPerSecond}` : "");
        if (prevTs && s.timestamp > prevTs) {
          const mbps = (s.bytesReceived - prevBytes) * 8 / (s.timestamp - prevTs) / 1000;
          $("s-vbr").textContent = `${mbps.toFixed(2)} Mbps`;
        }
        prevBytes = s.bytesReceived; prevTs = s.timestamp;

        // Windowed loss rate over the last poll interval — the auto-switch
        // signal. Cumulative counters, so diff against the previous sample.
        const lost = s.packetsLost ?? 0, recv = s.packetsReceived ?? 0;
        if (haveLossBaseline) {
          const dLost = Math.max(0, lost - prevLost);
          const dRecv = Math.max(0, recv - prevRecv);
          const total = dLost + dRecv;
          lossRate = total > 0 ? dLost / total : 0;
          $("s-loss").textContent = `${(lossRate * 100).toFixed(1)} %`;
        }
        prevLost = lost; prevRecv = recv; haveLossBaseline = true;

        $("s-drop").textContent = s.framesDropped ?? "—";
        if (s.jitterBufferDelay && s.jitterBufferEmittedCount) {
          const ms = s.jitterBufferDelay / s.jitterBufferEmittedCount * 1000;
          $("s-jb").textContent = `${ms.toFixed(0)} ms`;
        }
      }
      if (s.type === "candidate-pair" && s.state === "succeeded" && s.nominated &&
          s.currentRoundTripTime !== undefined) {
        $("s-rtt").textContent = `${(s.currentRoundTripTime * 1000).toFixed(1)} ms`;
      }
    });

    // ---- Auto-switch state machine ----
    if (qualityMode !== "auto" || lossRate === null) return;
    if (lossRate > DOWN_LOSS) { badSeconds++; goodSeconds = 0; }
    else if (lossRate < UP_LOSS) { goodSeconds++; badSeconds = 0; }
    else { badSeconds = 0; goodSeconds = 0; }

    const cooled = performance.now() - lastSwitchMs > SWITCH_COOLDOWN_MS;
    if (rendition === "hi" && loAvailable && badSeconds >= DOWN_AFTER_S && cooled) {
      switchRendition("lo", `loss ${(lossRate * 100).toFixed(1)}% for ${DOWN_AFTER_S}s`);
    } else if (rendition === "lo" && goodSeconds >= UP_AFTER_S && cooled) {
      switchRendition("hi", `clean for ${UP_AFTER_S}s`);
    }
  }

  // ---- MediaMTX API: viewer counts, egress, LO availability ------------------------
  async function pollApiStats() {
    const base = serviceBase("api");
    if (!base) return;
    try {
      const res = await fetch(`${base}/v3/paths/list`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      const now = performance.now();
      const perPath = {};
      let total = 0;

      loAvailable = false;
      for (const p of data.items || []) {
        perPath[p.name] = p.bytesSent || 0;
        total += p.bytesSent || 0;
        if (currentBase && p.name === `${currentBase}lo` && p.ready !== false)
          loAvailable = true;
        if (p.name === currentPath)
          $("s-viewers").textContent = (p.readers || []).length;
      }
      updateQualityUI();

      if (prevApi) {
        const dt = (now - prevApi.t) / 1000;
        if (dt > 0) {
          if (currentPath && perPath[currentPath] !== undefined &&
              prevApi.perPath[currentPath] !== undefined) {
            const mbps = (perPath[currentPath] - prevApi.perPath[currentPath]) * 8 / dt / 1e6;
            $("s-chout").textContent = `${mbps.toFixed(2)} Mbps`;
          }
          const allMbps = (total - prevApi.total) * 8 / dt / 1e6;
          $("s-allout").textContent = `${allMbps.toFixed(2)} Mbps`;
        }
      }
      prevApi = { t: now, perPath, total };
    } catch {
      $("s-viewers").textContent = "n/a";
      $("s-chout").textContent = "n/a";
      $("s-allout").textContent = "n/a";
    }
  }

  // ---- DeckLink input/reference status — runs continuously -------------------------
  // Prefer same-origin nexvue-status.php (Apache → loopback :9998) so HTTPS
  // pages are not blocked by mixed content or a second untrusted cert on
  // :9998. Fall back to direct :9998 only when the host field points at a
  // different edge hostname.
  function statusPollUrl() {
    try {
      const override = $("host").value.trim().replace(/\/+$/, "");
      if (override) {
        const host = new URL(override).hostname;
        if (host && host !== EDGE_HOST) {
          return serviceBase("status") + "/status";
        }
      }
    } catch { /* ignore bad override; use proxy */ }
    return "nexvue-status.php";
  }

  function clearSignalDots() {
    document.querySelectorAll("button.ch").forEach(b => {
      b.classList.remove("sig-ok", "sig-lost");
    });
  }

  async function pollInputStatus() {
    const statusUrl = statusPollUrl();
    try {
      const res = await fetch(statusUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const byIndex = {};
      for (const d of data.devices || []) byIndex[d.index] = d;

      if (data.error && (!data.devices || !data.devices.length)) {
        clearSignalDots();
        $("s-input").textContent = `status error: ${data.error}`;
        $("s-input").style.color = "var(--bad)";
        $("s-ref").textContent = "n/a";
        $("s-ref").style.color = "var(--dim)";
        console.warn("nexvue status:", data.error, statusUrl);
        return;
      }

      document.querySelectorAll("button.ch").forEach((b) => {
        const idx = parseInt(b.dataset.device || "", 10);
        const d = Number.isFinite(idx) ? byIndex[idx] : undefined;
        b.classList.remove("sig-ok", "sig-lost");
        if (!d) return;
        if (data.stale) {
          const base = b.dataset.path || `ch${idx}`;
          b.title = `${base}: status stale (daemon slow or helper lag)`;
          return;
        }
        b.classList.add(d.input_locked ? "sig-ok" : "sig-lost");
        b.title = d.input_locked ? `signal: ${d.input_mode}` : "no signal";
      });

      if (currentBase) {
        const btn = document.querySelector(`button.ch[data-path="${currentBase}"]`);
        const idx = btn
          ? parseInt(btn.dataset.device || "", 10)
          : parseInt(currentBase.replace(/\D/g, ""), 10);
        const d = byIndex[idx];
        if (data.stale) {
          $("s-input").textContent = d
            ? `${d.input_locked ? d.input_mode : "NO SIGNAL"} (stale)`
            : "stale";
          $("s-input").style.color = "var(--dim)";
          $("s-ref").textContent = d
            ? (d.reference_locked ? `locked · ${d.reference_mode}` : "free-run")
            : "—";
          $("s-ref").style.color = "var(--dim)";
        } else if (d) {
          $("s-input").textContent = d.input_locked ? d.input_mode : "NO SIGNAL";
          $("s-input").style.color = d.input_locked ? "" : "var(--bad)";
          $("s-ref").textContent = d.reference_locked
            ? `locked · ${d.reference_mode}` : "free-run";
          $("s-ref").style.color = d.reference_locked ? "" : "var(--dim)";
        }
      } else {
        $("s-input").textContent = data.stale ? "stale" : "—";
        $("s-input").style.color = data.stale ? "var(--dim)" : "";
        $("s-ref").textContent = "—";
        $("s-ref").style.color = "";
      }
    } catch (err) {
      clearSignalDots();
      $("s-input").textContent = "status unreachable";
      $("s-input").style.color = "var(--bad)";
      $("s-ref").textContent = "n/a";
      $("s-ref").style.color = "var(--dim)";
      console.warn("nexvue status poll failed:", statusUrl, err);
    }
  }
  setInterval(pollInputStatus, 2000);
  // First poll after channel buttons exist (created synchronously below).

  // ---- Quality selector -------------------------------------------------------------
  $("q-auto").addEventListener("click", () => {
    qualityMode = "auto";
    badSeconds = 0; goodSeconds = 0;
    updateQualityUI();
  });
  $("q-hi").addEventListener("click", () => {
    qualityMode = "manual";
    updateQualityUI();
    if (currentBase && rendition !== "hi") switchRendition("hi", "manual");
    else { rendition = "hi"; updateQualityUI(); }
  });
  $("q-lo").addEventListener("click", () => {
    if (!loAvailable) return;
    qualityMode = "manual";
    updateQualityUI();
    if (currentBase && rendition !== "lo") switchRendition("lo", "manual");
    else { rendition = "lo"; updateQualityUI(); }
  });

  // ---- Video transforms ---------------------------------------------------------------
  // Applied as an INLINE transform on the video (survives fullscreen, which a
  // CSS-class transform does not). State tracked in these flags.
  let mir = false, flp = false;
  function applyTransform() {
    const x = mir ? -1 : 1, y = flp ? -1 : 1;
    video.style.transform = (x === 1 && y === 1) ? "" : `scale(${x}, ${y})`;
  }
  $("mirror").addEventListener("click", () => {
    mir = !mir; $("mirror").classList.toggle("active", mir); applyTransform();
  });
  $("flip").addEventListener("click", () => {
    flp = !flp; $("flip").classList.toggle("active", flp); applyTransform();
  });

  // Fullscreen the WRAPPER (not the video element), so the video's inline
  // transform is never overridden by the browser's fullscreen video styling.
  const wrap = document.querySelector(".videowrap");
  $("fs").addEventListener("click", () => {
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
    }
  });
  // Re-assert the transform on fullscreen enter/exit, belt-and-suspenders in
  // case a browser resets inline styles across the transition.
  for (const ev of ["fullscreenchange", "webkitfullscreenchange"]) {
    document.addEventListener(ev, applyTransform);
  }

  // ---- Channel buttons ------------------------------------------------------------------
  // Labels use CHANNEL_ALIAS from ops API when available; WHEP path stays chN.
  // data-device maps DeckLink device-number for status dots (may differ from
  // channel id). Build buttons synchronously first so status polling has
  // targets immediately; then refresh labels/devices from ops.
  function renderChannelButtons(aliases, devices) {
    const prevActive = currentBase;
    $("channels").innerHTML = "";
    for (let i = 0; i < 8; i++) {
      const path = `ch${i}`;
      const label = aliases[path] || aliases[String(i)] || path;
      const device = (devices && Number.isFinite(devices[path]))
        ? devices[path]
        : i;
      const b = document.createElement("button");
      b.className = "ch";
      b.dataset.path = path;
      b.dataset.device = String(device);
      b.textContent = label;
      b.title = path === label ? path : `${label} (${path})`;
      if (prevActive === path) b.classList.add("active");
      b.addEventListener("click", () => connectChannel(path, b));
      $("channels").appendChild(b);
    }
  }

  async function loadChannelButtons() {
    let aliases = {};
    let devices = {};
    try {
      const res = await fetch("nexvue-ops.php?action=aliases");
      const data = await res.json();
      if (data && data.ok && data.aliases) aliases = data.aliases;
      if (data && data.ok && data.devices) devices = data.devices;
    } catch { /* ops API optional for bring-up */ }
    renderChannelButtons(aliases, devices);
  }

  renderChannelButtons({}, {});
  pollInputStatus();
  loadChannelButtons().then(() => pollInputStatus());
  $("disconnect").addEventListener("click", () => { teardown(); setState("idle"); });

  // ---- Session metrics drawer -------------------------------------------------------
  const drawer = $("stats-drawer");
  const toggle = $("stats-toggle");
  function setDrawerOpen(open) {
    drawer.classList.toggle("open", open);
    toggle.setAttribute("aria-expanded", open ? "true" : "false");
    try { sessionStorage.setItem("nexvue-stats-drawer", open ? "1" : "0"); } catch { /* private mode */ }
  }
  toggle.addEventListener("click", () => setDrawerOpen(!drawer.classList.contains("open")));
  try {
    if (sessionStorage.getItem("nexvue-stats-drawer") === "1") setDrawerOpen(true);
  } catch { /* default closed */ }

  // ---- Brand QR share ---------------------------------------------------------------
  function sharePageUrl() {
    const path = location.pathname || "/index.html";
    const search = location.search || "";
    try {
      const override = $("host").value.trim().replace(/\/+$/, "");
      if (override) {
        const u = new URL(override);
        if (u.hostname && u.hostname !== EDGE_HOST) {
          return `${u.protocol}//${u.host}${path}${search}`;
        }
      }
    } catch { /* ignore bad override */ }
    return `${location.origin}${path}${search}`;
  }

  const qrModal = $("qr-modal");
  function openQr() {
    const url = sharePageUrl();
    $("qr-url").textContent = url;
    try {
      NexVUEQR.render($("qr-canvas"), url, { scale: 6, margin: 2 });
    } catch (err) {
      console.warn("QR render failed:", err);
      $("qr-url").textContent = `${url}\n(QR unavailable: ${err.message})`;
    }
    qrModal.hidden = false;
    qrModal.classList.add("open");
  }
  function closeQr() {
    qrModal.classList.remove("open");
    qrModal.hidden = true;
  }
  $("brand").addEventListener("click", openQr);
  $("qr-close").addEventListener("click", closeQr);
  qrModal.addEventListener("click", (e) => { if (e.target === qrModal) closeQr(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && qrModal.classList.contains("open")) closeQr();
  });
  $("qr-copy").addEventListener("click", async () => {
    const url = $("qr-url").textContent.split("\n")[0];
    try {
      await navigator.clipboard.writeText(url);
      $("qr-copy").textContent = "Copied";
      setTimeout(() => { $("qr-copy").textContent = "Copy URL"; }, 1200);
    } catch {
      prompt("Copy URL:", url);
    }
  });
})();
</script>
</body>
</html>
