<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexVUE — Multiviewer</title>
<!--
  Dual / quad WHEP multiviewer for wall monitors and confidence checks.
  Defaults to LO (kinder when 2–4 sessions are open) with a global HI/LO
  toggle. Only one pane is unmuted at a time — click a pane to hear it.
  Reuses the same WHEP + latency-hint pattern as index.html.
-->
<script src="nexvue-ui.js"></script>
<style>
  :root {
    --bg: #14181d; --panel: #1d232b; --edge: #2c3542;
    --text: #d6dde6; --dim: #98a6b5; --muted: #b0bbc8;
    --ok: #4cc38a; --bad: #e5484d; --acc: #56c4f5; --on-acc: #08131a;
    --warn: #f5a623; --backdrop: rgba(0, 0, 0, .6);
    --overlay-scrim: rgba(20, 24, 29, .92);
    --badge-bg: rgba(20, 24, 29, .85);
  }
  html[data-theme="light"] {
    --bg: #f3f5f7; --panel: #ffffff; --edge: #cdd5de;
    --text: #1c232b; --dim: #5a6675; --muted: #3d4a58;
    --ok: #1f9d5c; --bad: #c62828; --acc: #0b7ea4; --on-acc: #ffffff;
    --warn: #b86e00; --backdrop: rgba(15, 23, 32, .4);
    --overlay-scrim: rgba(243, 245, 247, .94);
    --badge-bg: rgba(255, 255, 255, .9);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 16px; background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .topnav {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    margin: -16px -16px 16px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--edge);
    flex-shrink: 0;
  }
  .topnav .brand {
    background: none; border: none; color: var(--acc); font: inherit; font-weight: 600;
    font-size: 15px; padding: 6px 12px 6px 0; margin-right: 4px; cursor: pointer;
  }
  .topnav .brand:hover { text-decoration: underline; }
  .topnav .nav-logo {
    display: block; height: 28px; width: auto; max-width: 140px;
    object-fit: contain; margin-right: 8px;
  }
  .topnav .nav-logo[hidden] { display: none; }
  .topnav a {
    color: var(--muted); text-decoration: none; padding: 6px 12px;
    border-radius: 4px; border: 1px solid transparent;
  }
  .topnav a:hover { color: var(--text); border-color: var(--edge); }
  .topnav a.active {
    background: var(--acc); color: var(--on-acc); border-color: var(--acc); font-weight: 600;
  }
  .topnav .theme-toggle {
    margin-left: auto; background: var(--bg); color: var(--text);
    border: 1px solid var(--edge); border-radius: 4px; padding: 6px 10px;
    font: inherit; font-size: 12px; cursor: pointer;
  }
  .topnav .theme-toggle:hover { border-color: var(--acc); color: var(--acc); }
  .bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 12px; flex-shrink: 0;
    box-sizing: border-box;
  }
  input, button, select {
    background: var(--panel); color: var(--text); border: 1px solid var(--edge);
    border-radius: 4px; padding: 7px 10px; font: inherit;
  }
  input:focus, button:focus-visible, select:focus-visible {
    outline: 2px solid var(--acc); outline-offset: 1px;
  }
  button { cursor: pointer; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.layout.active, button.q.active, button.tgl.active {
    background: var(--acc); color: var(--on-acc); border-color: var(--acc); font-weight: 600;
  }
  .qlabel { color: var(--dim); }
  #state { color: var(--dim); }
  #state.ok { color: var(--ok); }
  #state.bad { color: var(--bad); }

  /* Grid stays reactive; on ultrawide, letterbox and center horizontally.
     .bar width/left inset are synced to #grid via ResizeObserver below. */
  .stage {
    flex: 1; min-height: 0; width: 100%;
    display: flex; justify-content: center; align-items: center;
    container-type: size;
  }
  #grid {
    display: grid; gap: 8px;
    max-width: 100%; max-height: 100%;
    margin-inline: auto;
  }
  #grid.dual {
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr;
    aspect-ratio: 32 / 9;
    width: min(100cqw, calc(100cqh * 32 / 9));
    height: auto;
  }
  #grid.quad {
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    aspect-ratio: 16 / 9;
    width: min(100cqw, calc(100cqh * 16 / 9));
    height: auto;
  }

  .pane {
    position: relative; background: #000; border: 2px solid var(--edge);
    border-radius: 4px; overflow: hidden; display: flex; flex-direction: column;
    min-height: 0; cursor: pointer;
  }
  .pane.audio-active { border-color: var(--acc); }
  .pane.hidden { display: none; }
  .pane-bar {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: var(--panel); border-bottom: 1px solid var(--edge); flex-shrink: 0;
    cursor: default;
  }
  .pane-bar select { flex: 1; min-width: 0; }
  .pane-status { color: var(--dim); font-size: 12px; white-space: nowrap; }
  .pane-status.ok { color: var(--ok); }
  .pane-status.bad { color: var(--bad); }
  .pane-video {
    flex: 1; min-height: 0; position: relative; background: #000;
  }
  .pane-video video {
    width: 100%; height: 100%; object-fit: contain; display: block; background: #000;
  }
  .pane-empty {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--dim); pointer-events: none;
  }
  .pane-empty.hidden { display: none; }
  .pane-kicked {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 12px; text-align: center;
    background: var(--overlay-scrim); color: var(--text); pointer-events: none;
  }
  .pane-kicked[hidden] { display: none; }
  .pane-kicked .kicked-title { color: var(--bad); font-weight: 600; font-size: 13px; }
  .pane-kicked .kicked-reason { color: var(--muted); font-size: 11px; max-width: 28em; }
  .pane-cc {
    position: absolute; left: 4%; right: 4%; bottom: 6%; z-index: 1;
    text-align: center; pointer-events: none;
    font: 600 1.8vmin/1.3 ui-monospace, "Cascadia Mono", Consolas, monospace;
    color: #fff; text-shadow: 0 1px 2px #000;
    white-space: pre-line; background: rgba(0,0,0,.55);
    padding: 0.15em 0.4em; border-radius: 2px;
    /* Constant two-line box (decoder emits ≤2 lines, newest at the bottom). */
    display: flex; flex-direction: column; justify-content: flex-end;
    min-height: calc(2 * 1.3em + 0.3em);
  }
  .pane-cc[hidden] { display: none; }
  .audio-badge {
    position: absolute; top: 8px; right: 8px; font-size: 11px;
    padding: 3px 8px; border-radius: 3px; background: var(--badge-bg);
    color: var(--acc); border: 1px solid var(--acc); display: none; z-index: 1;
  }
  .pane.audio-active .audio-badge { display: block; }

  body:fullscreen .stage, body:-webkit-full-screen .stage {
    flex: 1; min-height: 0;
  }
  body:fullscreen #grid, body:-webkit-full-screen #grid { gap: 4px; }
  body:fullscreen .topnav, body:-webkit-full-screen .topnav,
  body:fullscreen .bar, body:-webkit-full-screen .bar { display: none; }
  body:fullscreen, body:-webkit-full-screen { padding: 4px; }
  .qr-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: var(--backdrop); align-items: center; justify-content: center; padding: 16px;
  }
  .qr-modal.open { display: flex; }
  .qr-panel {
    background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
    padding: 20px; max-width: 360px; width: 100%; text-align: center;
  }
  .qr-panel h2 { margin: 0 0 12px; font-size: 14px; color: var(--acc); }
  .qr-panel canvas {
    image-rendering: pixelated; width: 220px; height: 220px;
    background: #fff; border-radius: 4px;
  }
  .qr-url {
    word-break: break-all; color: var(--dim); font-size: 12px;
    margin: 12px 0; text-align: left;
  }
  .qr-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<nav class="topnav" aria-label="NexVUE">
  <button type="button" class="brand" id="brand" title="Show page URL as QR code">NexVUE</button>
  <img class="nav-logo" src="nexvue-logo.php" alt="" hidden>
  <a href="/index.html">Player</a>
  <a href="/multiview.html" class="active">Multiview</a>
  <a href="/metrics.html">Metrics</a>
  <a href="/services.html">Services</a>
  <a href="/channels.html">Settings</a>
  <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" title="Switch to light mode">Light</button>
</nav>

<div class="bar">
  <span class="qlabel">layout:</span>
  <button id="layout-dual" class="layout">Dual</button>
  <button id="layout-quad" class="layout active">Quad</button>
  <span style="border-left:1px solid var(--edge);height:20px"></span>
  <span class="qlabel">quality:</span>
  <button id="q-hi" class="q">HI</button>
  <button id="q-lo" class="q active">LO</button>
  <button id="cc" class="tgl" title="Closed captions (CEA-608/CC1 side channel)">CC</button>
  <button id="fs" title="Fullscreen multiview">⛶ Fullscreen</button>
  <span id="state">idle</span>
</div>

<div class="stage">
  <div id="grid" class="quad">
    <!-- panes filled by JS -->
  </div>
</div>

<div id="qr-modal" class="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-title" hidden>
  <div class="qr-panel">
    <h2 id="qr-title">Open on phone</h2>
    <canvas id="qr-canvas" width="220" height="220" aria-hidden="true"></canvas>
    <div class="qr-url" id="qr-url"></div>
    <div class="qr-actions">
      <button type="button" id="qr-copy">Copy URL</button>
      <button type="button" id="qr-close">Close</button>
    </div>
  </div>
</div>

<script src="nexvue-qr.js"></script>
<script src="nexvue-captions.js"></script>
<script>
"use strict";
(() => {
  const $ = id => document.getElementById(id);
  const grid = $("grid");
  const stateEl = $("state");
  const PANE_COUNT = 4;
  const RECONNECT_MS = 5000;
  let preferFullscreen = false;
  let fsRestoreTimer = null;

  const PORT = { whep: 8889 };
  const PROTO = location.protocol === "https:" ? "https:" : "http:";
  const EDGE_HOST = (location.hostname && location.hostname.length)
    ? location.hostname : "127.0.0.1";

  let layout = "quad";   // "dual" | "quad"
  let rendition = "lo";  // "hi" | "lo" — LO default for multi-session load
  let audioPane = -1;    // index of unmuted pane, or -1
  let captionsOn = NexVueCaptions.getPref();
  const ccBtn = $("cc");
  ccBtn.classList.toggle("active", captionsOn);
  function paintAllCaptions() {
    for (const p of panes) {
      if (!p || !p.ccEl) continue;
      NexVueCaptions.renderOverlay(p.ccEl, p.lastCue || { clear: true }, captionsOn);
    }
  }
  ccBtn.addEventListener("click", () => {
    captionsOn = !captionsOn;
    NexVueCaptions.setPref(captionsOn);
    ccBtn.classList.toggle("active", captionsOn);
    paintAllCaptions();
  });

  // ---- Screen wake lock ---------------------------------------------------------
  // This page is explicitly for wall monitors / confidence checks — exactly
  // the case where the display must not sleep during a long unattended run.
  // Held while at least one pane is connected; released when all panes are
  // idle. Browsers force-release the lock whenever the tab is hidden, so it
  // must be re-acquired on visibilitychange too, or one alt-tab permanently
  // loses the stay-awake behavior.
  let wakeLock = null;

  async function acquireWakeLock() {
    if (!("wakeLock" in navigator) || wakeLock) return;
    try {
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
    } catch (e) {
      // Commonly fails if the tab isn't visible/focused yet; the
      // visibilitychange handler below re-attempts once it is.
    }
  }
  function releaseWakeLockIfIdle() {
    if (wakeLock && !panes.some(p => p.base)) {
      wakeLock.release();
      wakeLock = null;
    }
  }
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && panes.some(p => p.base)) {
      acquireWakeLock();
    }
  });

  function whepBase() {
    return `${PROTO}//${EDGE_HOST}:${PORT.whep}`;
  }

  function pathFor(base) {
    return rendition === "lo" ? `${base}lo` : base;
  }

  function setGlobalState(text, cls) {
    stateEl.textContent = text;
    stateEl.className = cls || "";
  }

  // ---- Per-pane session -------------------------------------------------------
  const panes = [];

  function createPane(index) {
    const el = document.createElement("div");
    el.className = "pane";
    el.dataset.index = String(index);
    el.innerHTML = `
      <div class="pane-bar">
        <select aria-label="Channel for pane ${index + 1}">
          <option value="">(none)</option>
        </select>
        <span class="pane-status">idle</span>
      </div>
      <div class="pane-video">
        <span class="audio-badge">AUDIO</span>
        <video autoplay playsinline muted></video>
        <div class="pane-cc" hidden></div>
        <div class="pane-empty">no channel</div>
        <div class="pane-kicked" hidden>
          <div class="kicked-title">Kicked by administrator</div>
          <div class="kicked-reason"></div>
        </div>
      </div>`;

    const select = el.querySelector("select");
    const statusEl = el.querySelector(".pane-status");
    const video = el.querySelector("video");
    const empty = el.querySelector(".pane-empty");
    const ccEl = el.querySelector(".pane-cc");
    const kickedEl = el.querySelector(".pane-kicked");
    const kickedReasonEl = kickedEl.querySelector(".kicked-reason");

    // Options filled after aliases load (fillChannelOptions).
    for (let i = 0; i < 10; i++) {
      const opt = document.createElement("option");
      opt.value = `ch${i}`;
      opt.textContent = `ch${i}`;
      select.appendChild(opt);
    }

    const pane = {
      index, el, select, statusEl, video, empty, ccEl, kickedEl, kickedReasonEl,
      captionClient: null,
      lastCue: { text: "", clear: true, seq: 0, service: "CC1" },
      base: null, path: null, pc: null, sessionId: null,
      intentionalClose: false,
      reconnectTimer: null, reconnectAttempt: 0
    };
    pane.captionClient = NexVueCaptions.connect((cue) => {
      pane.lastCue = cue;
      NexVueCaptions.renderOverlay(pane.ccEl, pane.lastCue, captionsOn);
    });

    select.addEventListener("change", () => {
      const val = select.value;
      hidePaneKicked(pane);
      if (!val) {
        closePane(pane, true);
        pane.base = null;
        pane.captionClient.setChannel(null);
        setPaneStatus(pane, "idle");
        empty.classList.remove("hidden");
        if (audioPane === index) selectAudio(-1);
        releaseWakeLockIfIdle();
        return;
      }
      pane.base = val;
      pane.captionClient.setChannel(val);
      empty.classList.add("hidden");
      acquireWakeLock();
      openPane(pane);
    });
    select.addEventListener("click", e => e.stopPropagation());

    el.addEventListener("click", () => {
      if (pane.base) selectAudio(index);
    });

    panes.push(pane);
    grid.appendChild(el);
    return pane;
  }

  function setPaneStatus(pane, text, cls) {
    pane.statusEl.textContent = text;
    pane.statusEl.className = "pane-status" + (cls ? " " + cls : "");
  }

  function closePane(pane, intentional) {
    pane.intentionalClose = intentional;
    // Only clear reconnect when intentionally stopping; heal paths schedule
    // after close. openPane clears the timer when starting a new attempt.
    if (intentional && pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    if (pane.pc) {
      pane.pc.close();
      pane.pc = null;
    }
    pane.video.srcObject = null;
    pane.path = null;
    pane.sessionId = null;
    pane.video.muted = true;
  }

  function parseWhepSessionId(res) {
    // MediaMTX WHEP POST exposes ID (API session uuid) and Location (.../whep/<secret>).
    // Kick registry / Metrics use the API uuid — Location's secret must not be used.
    const idHdr = res.headers.get("ID") || res.headers.get("id") || "";
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(idHdr)) {
      return idHdr;
    }
    return null;
  }

  function decodeKickReason(s) {
    return String(s)
      .replace(/&quot;/g, '"')
      .replace(/&#039;/g, "'")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&amp;/g, "&");
  }

  function hidePaneKicked(pane) {
    pane.kickedEl.hidden = true;
    pane.kickedReasonEl.textContent = "";
  }

  function showPaneKicked(pane, reason) {
    pane.kickedReasonEl.textContent = decodeKickReason(reason || "");
    pane.kickedReasonEl.hidden = !pane.kickedReasonEl.textContent;
    pane.kickedEl.hidden = false;
    emptyHidden(pane, true);
  }

  async function checkKicked(sessionId) {
    const q = new URLSearchParams({ action: "kick_check" });
    if (sessionId) q.set("session_id", sessionId);
    const res = await fetch(`nexvue-ops.php?${q}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return { kicked: !!data.kicked, reason: data.reason || "" };
  }

  function applyPaneKicked(pane, reason) {
    pane.intentionalClose = true;
    if (pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    closePane(pane, true);
    showPaneKicked(pane, reason);
    setPaneStatus(pane, "kicked by administrator", "bad");
    updateGlobalState();
  }

  function scheduleReconnect(pane, reason) {
    if (pane.intentionalClose || pane.reconnectTimer || !pane.base) return;
    pane.reconnectAttempt++;
    const hint = reason ? `${reason} — ` : "";
    setPaneStatus(
      pane,
      `${hint}retry in ${RECONNECT_MS / 1000}s…`,
      "bad"
    );
    pane.reconnectTimer = setTimeout(() => {
      pane.reconnectTimer = null;
      if (pane.intentionalClose || !pane.base) return;
      setPaneStatus(pane, `reconnecting…`, "bad");
      openPane(pane);
    }, RECONNECT_MS);
  }

  async function maybeReconnectPane(pane, reason) {
    if (pane.intentionalClose || !pane.base) return;
    const sid = pane.sessionId;
    try {
      const result = await checkKicked(sid);
      if (result.kicked) {
        applyPaneKicked(pane, result.reason);
        return;
      }
    } catch (e) { /* heal as usual */ }
    scheduleReconnect(pane, reason);
  }

  function restoreFullscreenIfNeeded() {
    if (!preferFullscreen) return;
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) return;
    if (fsRestoreTimer) return;
    fsRestoreTimer = setTimeout(() => {
      fsRestoreTimer = null;
      if (!preferFullscreen) return;
      const still = document.fullscreenElement || document.webkitFullscreenElement;
      if (still) return;
      try {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el).catch(() => { /* gesture policy */ });
      } catch (e) { /* unsupported */ }
    }, 100);
  }

  async function openPane(pane) {
    if (!pane.base) return;
    if (pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    closePane(pane, false);
    pane.intentionalClose = false;
    hidePaneKicked(pane);
    const path = pathFor(pane.base);
    pane.path = path;
    setPaneStatus(pane, `connecting…`);
    emptyHidden(pane, true);

    const url = `${whepBase()}/${path}/whep`;
    const pc = new RTCPeerConnection();
    pane.pc = pc;
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });
    pc.ontrack = ev => {
      try { ev.receiver.playoutDelayHint = 0; } catch (e) { /* unsupported */ }
      try { ev.receiver.jitterBufferTarget = 0; } catch (e) { /* unsupported */ }
      if (!pane.video.srcObject) pane.video.srcObject = ev.streams[0];
      pane.video.muted = audioPane !== pane.index;
    };
    pc.onconnectionstatechange = () => {
      if (!pane.pc || pane.pc !== pc) return;
      if (pc.connectionState === "connected") {
        setPaneStatus(pane, path, "ok");
        pane.reconnectAttempt = 0;
        restoreFullscreenIfNeeded();
        updateGlobalState();
      } else if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
        setPaneStatus(pane, pc.connectionState, "bad");
        if (!pane.intentionalClose && pane.base) {
          maybeReconnectPane(pane, pc.connectionState);
        }
        updateGlobalState();
      }
    };

    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await new Promise(resolve => {
        if (pc.iceGatheringState === "complete") return resolve();
        const check = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", check);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", check);
        setTimeout(resolve, 2000);
      });
      if (pane.pc !== pc) return;  // superseded

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/sdp" },
        body: pc.localDescription.sdp
      });
      if (!res.ok) throw new Error(`WHEP ${res.status}`);
      pane.sessionId = parseWhepSessionId(res);
      await pc.setRemoteDescription({ type: "answer", sdp: await res.text() });
    } catch (err) {
      const msg = err && err.message ? err.message : String(err);
      setPaneStatus(pane, `error: ${msg}`, "bad");
      const sid = pane.sessionId;
      closePane(pane, false);
      pane.sessionId = sid; // preserve for kick_check IP/session lookup on heal
      if (pane.base) maybeReconnectPane(pane, `error: ${msg}`);
      updateGlobalState();
    }
  }

  function emptyHidden(pane, hide) {
    pane.empty.classList.toggle("hidden", hide);
  }

  function selectAudio(index) {
    audioPane = index;
    panes.forEach((p, i) => {
      p.el.classList.toggle("audio-active", i === index && !!p.base);
      p.video.muted = i !== index;
    });
  }

  function reconnectAllActive() {
    panes.forEach(p => {
      if (p.base) openPane(p);
    });
  }

  function updateGlobalState() {
    const active = panes.filter(p => p.base);
    if (active.length === 0) {
      setGlobalState("idle");
      return;
    }
    const bad = active.filter(p => p.statusEl.classList.contains("bad"));
    const ok = active.filter(p => p.statusEl.classList.contains("ok"));
    if (bad.length) setGlobalState(`${ok.length}/${active.length} connected`, "bad");
    else if (ok.length === active.length) setGlobalState(`${ok.length} connected`, "ok");
    else setGlobalState(`connecting ${ok.length}/${active.length}…`);
  }

  function applyLayout(mode) {
    layout = mode;
    grid.className = mode;
    $("layout-dual").classList.toggle("active", mode === "dual");
    $("layout-quad").classList.toggle("active", mode === "quad");
    panes.forEach((p, i) => {
      const visible = mode === "quad" || i < 2;
      p.el.classList.toggle("hidden", !visible);
      if (!visible && p.base) {
        // Tear down hidden panes so we don't keep unused WHEP sessions.
        closePane(p, true);
        p.base = null;
        p.captionClient.setChannel(null);
        p.select.value = "";
        emptyHidden(p, false);
        setPaneStatus(p, "idle");
        if (audioPane === i) selectAudio(-1);
      }
    });
    updateGlobalState();
    releaseWakeLockIfIdle();
  }

  function setRendition(rend) {
    if (rend === rendition) return;
    rendition = rend;
    $("q-hi").classList.toggle("active", rend === "hi");
    $("q-lo").classList.toggle("active", rend === "lo");
    reconnectAllActive();
  }

  // ---- Controls ---------------------------------------------------------------
  $("layout-dual").addEventListener("click", () => applyLayout("dual"));
  $("layout-quad").addEventListener("click", () => applyLayout("quad"));
  $("q-hi").addEventListener("click", () => setRendition("hi"));
  $("q-lo").addEventListener("click", () => setRendition("lo"));

  $("fs").addEventListener("click", () => {
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      (document.documentElement.requestFullscreen ||
       document.documentElement.webkitRequestFullscreen).call(document.documentElement);
    }
  });
  for (const ev of ["fullscreenchange", "webkitfullscreenchange"]) {
    document.addEventListener(ev, () => {
      const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      preferFullscreen = !!fsEl;
    });
  }

  for (let i = 0; i < PANE_COUNT; i++) createPane(i);
  applyLayout("quad");

  // Keep the control bar's left edge glued to the centered grid.
  (function syncBarToGrid() {
    const stage = document.querySelector(".stage");
    const bar = document.querySelector(".bar");
    if (!stage || !bar || !grid) return;
    function sync() {
      const gr = grid.getBoundingClientRect();
      const sr = stage.getBoundingClientRect();
      bar.style.width = gr.width + "px";
      bar.style.marginLeft = Math.max(0, gr.left - sr.left) + "px";
      bar.style.marginRight = "auto";
    }
    new ResizeObserver(sync).observe(grid);
    window.addEventListener("resize", sync);
    sync();
  })();

  // Friendly labels from CHANNEL_ALIAS when ops API is available.
  (async () => {
    try {
      const res = await fetch("nexvue-ops.php?action=aliases");
      const data = await res.json();
      if (!data || !data.ok || !data.aliases) return;
      panes.forEach(p => {
        [...p.select.options].forEach(opt => {
          if (!opt.value) return;
          const label = data.aliases[opt.value] || data.aliases[opt.value.replace(/\D/g, "")];
          if (label) opt.textContent = label === opt.value ? opt.value : `${label} (${opt.value})`;
        });
      });
    } catch { /* optional */ }
  })();

  function sharePageUrl() {
    const path = location.pathname || "/multiview.html";
    const search = location.search || "";
    return `${location.origin}${path}${search}`;
  }
  const qrModal = $("qr-modal");
  function openQr() {
    const url = sharePageUrl();
    $("qr-url").textContent = url;
    try { NexVUEQR.render($("qr-canvas"), url, { scale: 6, margin: 2 }); }
    catch (err) {
      console.warn("QR render failed:", err);
      $("qr-url").textContent = `${url}\n(QR unavailable: ${err.message})`;
    }
    qrModal.hidden = false;
    qrModal.classList.add("open");
  }
  function closeQr() {
    qrModal.classList.remove("open");
    qrModal.hidden = true;
  }
  $("brand").addEventListener("click", openQr);
  $("qr-close").addEventListener("click", closeQr);
  qrModal.addEventListener("click", (e) => { if (e.target === qrModal) closeQr(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && qrModal.classList.contains("open")) closeQr();
  });
  $("qr-copy").addEventListener("click", async () => {
    const url = $("qr-url").textContent.split("\n")[0];
    try {
      await navigator.clipboard.writeText(url);
      $("qr-copy").textContent = "Copied";
      setTimeout(() => { $("qr-copy").textContent = "Copy URL"; }, 1200);
    } catch { prompt("Copy URL:", url); }
  });
})();
</script>
</body>
</html>
