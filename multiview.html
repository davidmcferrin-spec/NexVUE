<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexVUE — Multiviewer</title>
<!--
  Dual / quad WHEP multiviewer for wall monitors and confidence checks.
  Defaults to LO (kinder when 2–4 sessions are open) with a global HI/LO
  toggle. Only one pane is audible at a time — click a pane to hear it.
  Per-channel VU meters + solo are browser-local (nexvue-vu.js).
  Reuses the same WHEP + latency-hint pattern as index.html.
-->
<script src="nexvue-ui.js"></script>
<style>
  :root {
    --bg: #14181d; --panel: #1d232b; --edge: #2c3542;
    --text: #d6dde6; --dim: #98a6b5; --muted: #b0bbc8;
    --ok: #4cc38a; --bad: #e5484d; --acc: #56c4f5; --on-acc: #08131a;
    --warn: #f5a623; --backdrop: rgba(0, 0, 0, .6);
    --overlay-scrim: rgba(20, 24, 29, .92);
    --badge-bg: rgba(20, 24, 29, .85);
  }
  html[data-theme="light"] {
    --bg: #f3f5f7; --panel: #ffffff; --edge: #cdd5de;
    --text: #1c232b; --dim: #5a6675; --muted: #3d4a58;
    --ok: #1f9d5c; --bad: #c62828; --acc: #0b7ea4; --on-acc: #ffffff;
    --warn: #b86e00; --backdrop: rgba(15, 23, 32, .4);
    --overlay-scrim: rgba(243, 245, 247, .94);
    --badge-bg: rgba(255, 255, 255, .9);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 16px; background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .topnav {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    margin: -16px -16px 16px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--edge);
    flex-shrink: 0;
  }
  .topnav .brand {
    background: none; border: none; color: var(--acc); font: inherit; font-weight: 600;
    font-size: 15px; padding: 6px 12px 6px 0; margin-right: 4px; cursor: pointer;
  }
  .topnav .brand:hover { text-decoration: underline; }
  .topnav .nav-logo {
    display: block; height: 28px; width: auto; max-width: 140px;
    object-fit: contain; margin-right: 8px;
  }
  .topnav .nav-logo[hidden] { display: none; }
  .topnav a {
    color: var(--muted); text-decoration: none; padding: 6px 12px;
    border-radius: 4px; border: 1px solid transparent;
  }
  .topnav a:hover { color: var(--text); border-color: var(--edge); }
  .topnav a.active {
    background: var(--acc); color: var(--on-acc); border-color: var(--acc); font-weight: 600;
  }
  .topnav .theme-toggle {
    margin-left: auto; background: var(--bg); color: var(--text);
    border: 1px solid var(--edge); border-radius: 4px; padding: 6px 10px;
    font: inherit; font-size: 12px; cursor: pointer;
  }
  .topnav .theme-toggle:hover { border-color: var(--acc); color: var(--acc); }
  .vol-wrap {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .vol-wrap input[type="range"] {
    width: 100px; padding: 0; height: 6px; accent-color: var(--acc);
    cursor: pointer; background: transparent; border: none;
  }
  .vol-wrap #vol-pct {
    min-width: 3em; color: var(--dim); font-size: 12px;
  }
  .bar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin-bottom: 12px; flex-shrink: 0;
    box-sizing: border-box;
  }
  input, button, select {
    background: var(--panel); color: var(--text); border: 1px solid var(--edge);
    border-radius: 4px; padding: 7px 10px; font: inherit;
  }
  input:focus, button:focus-visible, select:focus-visible {
    outline: 2px solid var(--acc); outline-offset: 1px;
  }
  button { cursor: pointer; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.layout.active, button.q.active, button.tgl.active {
    background: var(--acc); color: var(--on-acc); border-color: var(--acc); font-weight: 600;
  }
  .qlabel { color: var(--dim); }
  #state { color: var(--dim); }
  #state.ok { color: var(--ok); }
  #state.bad { color: var(--bad); }

  /* Grid stays reactive; on ultrawide, letterbox and center horizontally.
     .bar width/left inset are synced to #grid via ResizeObserver below. */
  .stage {
    flex: 1; min-height: 0; width: 100%;
    display: flex; justify-content: center; align-items: center;
    container-type: size;
  }
  #grid {
    display: grid; gap: 8px;
    max-width: 100%; max-height: 100%;
    margin-inline: auto;
  }
  #grid.dual {
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr;
    aspect-ratio: 32 / 9;
    width: min(100cqw, calc(100cqh * 32 / 9));
    height: auto;
  }
  #grid.quad {
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    aspect-ratio: 16 / 9;
    width: min(100cqw, calc(100cqh * 16 / 9));
    height: auto;
  }

  .pane {
    position: relative; background: #000; border: 2px solid var(--edge);
    border-radius: 4px; overflow: hidden; display: flex; flex-direction: column;
    min-height: 0; cursor: pointer;
  }
  .pane.audio-active { border-color: var(--acc); }
  .pane.hidden { display: none; }
  .pane-bar {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: var(--panel); border-bottom: 1px solid var(--edge); flex-shrink: 0;
    cursor: default;
  }
  .pane-bar select { flex: 1; min-width: 0; }
  .pane-status { color: var(--dim); font-size: 12px; white-space: nowrap; }
  .pane-status.ok { color: var(--ok); }
  .pane-status.bad { color: var(--bad); }
  .pane-video {
    flex: 1; min-height: 0; position: relative; background: #000;
  }
  .pane-video video {
    width: 100%; height: 100%; object-fit: contain; display: block; background: #000;
  }
  .pane-empty {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--dim); pointer-events: none;
  }
  .pane-empty.hidden { display: none; }
  .pane-kicked {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 12px; text-align: center;
    background: var(--overlay-scrim); color: var(--text); pointer-events: none;
  }
  .pane-kicked[hidden] { display: none; }
  .pane-kicked .kicked-title { color: var(--bad); font-weight: 600; font-size: 13px; }
  .pane-kicked .kicked-reason { color: var(--muted); font-size: 11px; max-width: 28em; }
  .pane-cc {
    position: absolute; left: 4%; right: 4%; bottom: 6%; z-index: 1;
    text-align: center; pointer-events: none;
    font: 600 1.8vmin/1.3 ui-monospace, "Cascadia Mono", Consolas, monospace;
    color: #fff; text-shadow: 0 1px 2px #000;
    white-space: pre-line; background: rgba(0,0,0,.55);
    padding: 0.15em 0.4em; border-radius: 2px;
    /* Constant two-line box (decoder emits ≤2 lines, newest at the bottom). */
    display: flex; flex-direction: column; justify-content: flex-end;
    min-height: calc(2 * 1.3em + 0.3em);
  }
  .pane-cc[hidden] { display: none; }
  .audio-badge {
    position: absolute; top: 8px; left: 8px; font-size: 11px;
    padding: 3px 8px; border-radius: 3px; background: var(--badge-bg);
    color: var(--acc); border: 1px solid var(--acc); display: none; z-index: 1;
  }
  .pane.audio-active .audio-badge { display: block; }

  .stats-drawer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--panel); border-top: 1px solid var(--edge);
  }
  .stats-drawer #stats-toggle {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; border: none; border-radius: 0; padding: 10px 16px;
    color: var(--dim); font: inherit; cursor: pointer;
  }
  .stats-drawer #stats-toggle:hover { color: var(--text); }
  .stats-drawer .caret { display: inline-block; transition: transform .15s ease; }
  .stats-drawer.open .caret { transform: rotate(180deg); }
  .stats-drawer .stats-panel {
    display: none; max-height: 40vh; overflow: auto; padding: 0 16px 16px;
  }
  .stats-drawer.open .stats-panel { display: block; }
  #stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px; max-width: 1280px; margin: 0 auto;
  }
  .stat {
    background: var(--bg); border: 1px solid var(--edge); border-radius: 4px; padding: 8px 10px;
    cursor: help;
  }
  .stat:focus-visible { outline: 2px solid var(--acc); outline-offset: 1px; }
  .stat .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .stat .v { font-size: 16px; margin-top: 2px; }
  #stat-tip {
    display: none; position: fixed; z-index: 60; max-width: 320px;
    padding: 8px 10px; background: var(--panel); color: var(--text);
    border: 1px solid var(--edge); border-radius: 4px;
    font: 12px/1.4 ui-monospace, "Cascadia Mono", Consolas, monospace;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); pointer-events: none;
  }
  #stat-tip.visible { display: block; }

  body:fullscreen .stage, body:-webkit-full-screen .stage {
    flex: 1; min-height: 0;
  }
  body:fullscreen #grid, body:-webkit-full-screen #grid { gap: 4px; }
  body:fullscreen .topnav, body:-webkit-full-screen .topnav,
  body:fullscreen .bar, body:-webkit-full-screen .bar,
  body:fullscreen .stats-drawer, body:-webkit-full-screen .stats-drawer { display: none; }
  body:fullscreen, body:-webkit-full-screen { padding: 4px; }
  .qr-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: var(--backdrop); align-items: center; justify-content: center; padding: 16px;
  }
  .qr-modal.open { display: flex; }
  .qr-panel {
    background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
    padding: 20px; max-width: 360px; width: 100%; text-align: center;
  }
  .qr-panel h2 { margin: 0 0 12px; font-size: 14px; color: var(--acc); }
  .qr-panel canvas {
    image-rendering: pixelated; width: 220px; height: 220px;
    background: #fff; border-radius: 4px;
  }
  .qr-url {
    word-break: break-all; color: var(--dim); font-size: 12px;
    margin: 12px 0; text-align: left;
  }
  .qr-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>

<nav class="topnav" aria-label="NexVUE">
  <button type="button" class="brand" id="brand" title="Show page URL as QR code">NexVUE</button>
  <img class="nav-logo" src="nexvue-logo.php" alt="" hidden>
  <a href="/index.html">Player</a>
  <a href="/multiview.html" class="active">Multiview</a>
  <a href="/metrics.html">Metrics</a>
  <a href="/services.html">Services</a>
  <a href="/channels.html">Settings</a>
  <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" title="Switch to light mode">Light</button>
</nav>

<div class="bar">
  <span class="qlabel">layout:</span>
  <button id="layout-dual" class="layout">Dual</button>
  <button id="layout-quad" class="layout active">Quad</button>
  <span style="border-left:1px solid var(--edge);height:20px"></span>
  <span class="qlabel">quality:</span>
  <button id="q-hi" class="q">HI</button>
  <button id="q-lo" class="q active">LO</button>
  <button id="cc" class="tgl" title="Closed captions (CEA-608/CC1 side channel)">CC</button>
  <button id="vu" class="tgl" title="VU meters + Main/SAP / St/5.1 (this browser only)">VU</button>
  <button id="mute" class="tgl" title="Mute focused pane (this browser only)">Mute</button>
  <span class="vol-wrap" title="Volume (this browser only — Web Audio)">
    <span class="qlabel">vol</span>

  </div>

<div id="stats-drawer" class="stats-drawer">
  <button type="button" id="stats-toggle" aria-expanded="false" aria-controls="stats">
    <span class="caret" aria-hidden="true">▴</span> Session metrics
    <span id="stats-focus-hint" class="qlabel" style="font-size:12px"></span>
  </button>
  <div class="stats-panel" id="stats-panel">
    <div id="stats">
      <div class="stat" tabindex="0" data-tip="Which pane the metrics below describe. Click a pane to hear it (AUDIO badge) and focus metrics on that session. VU solo is local to this browser."><div class="k">Focus</div><div class="v" id="s-focus">—</div></div>
      <div class="stat" tabindex="0" data-tip="Global HI/LO quality for all panes (Multiview has no per-pane auto-switch)."><div class="k">Rendition</div><div class="v" id="s-rend">—</div></div>
      <div class="stat" tabindex="0" data-tip="Frame size and frame rate of the focused pane as decoded by this browser."><div class="k">Resolution / FPS</div><div class="v" id="s-res">—</div></div>
      <div class="stat" tabindex="0" data-tip="Video data rate this browser is receiving for the focused pane only."><div class="k">My video bitrate</div><div class="v" id="s-vbr">—</div></div>
      <div class="stat" tabindex="0" data-tip="Network round-trip time between this browser and the edge server for the focused pane. Lower is better; LAN is typically under 5 ms."><div class="k">RTT (ICE)</div><div class="v" id="s-rtt">—</div></div>
      <div class="stat" tabindex="0" data-tip="Extra delay the browser adds to smooth out uneven packet arrival on the focused pane. Near 0 ms is ideal on a LAN."><div class="k">Jitter buffer</div><div class="v" id="s-jb">—</div></div>
      <div class="stat" tabindex="0" data-tip="Percentage of video packets lost over the last second on the focused pane."><div class="k">Loss (1s)</div><div class="v" id="s-loss">—</div></div>
      <div class="stat" tabindex="0" data-tip="Total video frames the browser discarded on the focused pane because they arrived too late to display."><div class="k">Frames dropped</div><div class="v" id="s-drop">—</div></div>
      <div class="stat" tabindex="0" data-tip="How many viewers are connected to the focused stream path on the edge (all sessions, not just this pane)."><div class="k">Viewers (path)</div><div class="v" id="s-viewers">—</div></div>
      <div class="stat" tabindex="0" data-tip="Total outbound bandwidth the edge is sending for the focused channel path, across all its viewers."><div class="k">Path egress</div><div class="v" id="s-chout">—</div></div>
      <div class="stat" tabindex="0" data-tip="Total outbound bandwidth from the edge across every channel and viewer."><div class="k">Edge egress (all)</div><div class="v" id="s-allout">—</div></div>
      <div class="stat" tabindex="0" data-tip="Video format detected on the DeckLink SDI input for the focused channel, or NO SIGNAL if nothing is connected."><div class="k">SDI input</div><div class="v" id="s-input">—</div></div>
      <div class="stat" tabindex="0" data-tip="Genlock reference status on the capture card — locked to house sync, or free-running."><div class="k">Reference</div><div class="v" id="s-ref">—</div></div>
      <div class="stat" tabindex="0" data-tip="Whether the browser holds a screen wake lock so the display won't sleep during playback."><div class="k">Screen awake</div><div class="v" id="s-wake">—</div></div>
    </div>
  </div>
</div>
<div id="stat-tip" role="tooltip" aria-hidden="true"></div>

<div id="qr-modal" class="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-title" hidden>
  <div class="qr-panel">
    <h2 id="qr-title">Open on phone</h2>
    <canvas id="qr-canvas" width="220" height="220" aria-hidden="true"></canvas>
    <div class="qr-url" id="qr-url"></div>
    <div class="qr-actions">
      <button type="button" id="qr-copy">Copy URL</button>
      <button type="button" id="qr-close">Close</button>
    </div>
  </div>
</div>

<script src="nexvue-qr.js"></script>
<script src="nexvue-captions.js"></script>
<script src="nexvue-vu.js"></script>
<script>
"use strict";
(() => {
  const $ = id => document.getElementById(id);
  const grid = $("grid");
  const stateEl = $("state");
  const PANE_COUNT = 4;
  const RECONNECT_MS = 5000;
  let preferFullscreen = false;
  let fsRestoreTimer = null;

  const PORT = { whep: 8889, api: 9997, status: 9998 };
  const PROTO = location.protocol === "https:" ? "https:" : "http:";
  const EDGE_HOST = (location.hostname && location.hostname.length)
    ? location.hostname : "127.0.0.1";

  let layout = "quad";   // "dual" | "quad"
  let rendition = "lo";  // "hi" | "lo" — LO default for multi-session load
  let audioPane = -1;    // index of listening pane, or -1
  let audioLayoutByPath = {};
  let audioEmbedsByPath = {};
  // Declared before VU/volume helpers — applyVolumeAll() runs at init and
  // must not hit the const TDZ (would abort the whole script before panes
  // are created, leaving the dual/quad grid empty).
  const panes = [];
  let captionsOn = NexVueCaptions.getPref();
  const ccBtn = $("cc");
  const vuBtn = $("vu");
  const muteBtn = $("mute");
  const volEl = $("volume");
  const volPct = $("vol-pct");
  let vuOn = NexVueVu.getVisiblePref();
  let userMuted = NexVueVu.getMutedPref();
  ccBtn.classList.toggle("active", captionsOn);
  vuBtn.classList.toggle("active", vuOn);
  function paintAllCaptions() {
    for (const p of panes) {
      if (!p || !p.ccEl) continue;
      NexVueCaptions.renderOverlay(p.ccEl, p.lastCue || { clear: true }, captionsOn);
    }
  }
  function applyVuVisible() {
    for (const p of panes) {
      if (p && p.vu) p.vu.setVisible(vuOn);
    }
  }
  function applyVolumeAll() {
    const v = NexVueVu.getVolumePref();
    const pct = Math.round(v * 100);
    volEl.value = String(pct);
    volPct.textContent = pct + "%";
    for (const p of panes) {
      if (p && p.vu) p.vu.setVolume(v, { persist: false });
    }
  }
  function paintMuteBtn() {
    muteBtn.classList.toggle("active", userMuted || audioPane < 0);
    muteBtn.textContent = userMuted ? "Muted" : "Mute";
  }
  function applyListenAll() {
    panes.forEach((p, i) => {
      if (!p.vu) return;
      const on = !userMuted && i === audioPane && !!p.base;
      p.vu.setListen(on, { persist: false });
    });
    paintMuteBtn();
  }
  ccBtn.addEventListener("click", () => {
    captionsOn = !captionsOn;
    NexVueCaptions.setPref(captionsOn);
    ccBtn.classList.toggle("active", captionsOn);
    paintAllCaptions();
  });
  vuBtn.addEventListener("click", () => {
    vuOn = !vuOn;
    NexVueVu.setVisiblePref(vuOn);
    vuBtn.classList.toggle("active", vuOn);
    applyVuVisible();
  });
  muteBtn.addEventListener("click", () => {
    userMuted = !userMuted;
    NexVueVu.setMutedPref(userMuted);
    applyListenAll();
    NexVueVu.resume();
  });
  volEl.addEventListener("input", () => {
    const v = (parseInt(volEl.value, 10) || 0) / 100;
    NexVueVu.setVolumePref(v);
    applyVolumeAll();
    if (v > 0 && userMuted) {
      userMuted = false;
      NexVueVu.setMutedPref(false);
      applyListenAll();
    }
    NexVueVu.resume();
  });
  applyVolumeAll();
  paintMuteBtn();

  // Session metrics for the focused pane (audio-active, else first connected).
  let prevBytes = 0, prevTs = 0;
  let prevLost = 0, prevRecv = 0, haveLossBaseline = false;
  let prevApi = null;
  let statsFocusIndex = -1;

  // ---- Screen wake lock ---------------------------------------------------------
  // This page is explicitly for wall monitors / confidence checks — exactly
  // the case where the display must not sleep during a long unattended run.
  // Held while at least one pane is connected; released when all panes are
  // idle. Browsers force-release the lock whenever the tab is hidden, so it
  // must be re-acquired on visibilitychange too, or one alt-tab permanently
  // loses the stay-awake behavior.
  let wakeLock = null;

  function setWakeStat(text, color) {
    const el = $("s-wake");
    if (!el) return;
    el.textContent = text;
    el.style.color = color || "";
  }

  async function acquireWakeLock() {
    if (!("wakeLock" in navigator)) {
      setWakeStat("unsupported", "var(--dim)");
      return;
    }
    if (wakeLock) return;
    try {
      wakeLock = await navigator.wakeLock.request("screen");
      setWakeStat("on", "var(--ok)");
      wakeLock.addEventListener("release", () => {
        wakeLock = null;
        setWakeStat("released", "var(--dim)");
      });
    } catch (e) {
      setWakeStat("failed", "var(--bad)");
      // Commonly fails if the tab isn't visible/focused yet; the
      // visibilitychange handler below re-attempts once it is.
    }
  }
  function releaseWakeLockIfIdle() {
    if (wakeLock && !panes.some(p => p.base)) {
      wakeLock.release();
      wakeLock = null;
      setWakeStat("—", "");
    }
  }
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && panes.some(p => p.base)) {
      acquireWakeLock();
    }
  });

  function whepBase() {
    return `${PROTO}//${EDGE_HOST}:${PORT.whep}`;
  }

  function serviceBase(service) {
    return `${PROTO}//${EDGE_HOST}:${PORT[service]}`;
  }

  function pathFor(base) {
    return rendition === "lo" ? `${base}lo` : base;
  }

  function setGlobalState(text, cls) {
    stateEl.textContent = text;
    stateEl.className = cls || "";
  }

  // ---- Per-pane session -------------------------------------------------------

  function createPane(index) {
    const el = document.createElement("div");
    el.className = "pane";
    el.dataset.index = String(index);
    el.innerHTML = `
      <div class="pane-bar">
        <select aria-label="Channel for pane ${index + 1}">
          <option value="">(none)</option>
        </select>
        <span class="pane-status">idle</span>
      </div>
      <div class="pane-video">
        <span class="audio-badge">AUDIO</span>
        <video autoplay playsinline muted></video>
        <div class="pane-cc" hidden></div>
        <div class="pane-empty">no channel</div>
        <div class="pane-kicked" hidden>
          <div class="kicked-title">Kicked by administrator</div>
          <div class="kicked-reason"></div>
        </div>
      </div>`;

    const select = el.querySelector("select");
    const statusEl = el.querySelector(".pane-status");
    const video = el.querySelector("video");
    const videoBox = el.querySelector(".pane-video");
    const empty = el.querySelector(".pane-empty");
    const ccEl = el.querySelector(".pane-cc");
    const kickedEl = el.querySelector(".pane-kicked");
    const kickedReasonEl = kickedEl.querySelector(".kicked-reason");

    // Options filled after aliases load (fillChannelOptions).
    for (let i = 0; i < 10; i++) {
      const opt = document.createElement("option");
      opt.value = `ch${i}`;
      opt.textContent = `ch${i}`;
      select.appendChild(opt);
    }

    const pane = {
      index, el, select, statusEl, video, empty, ccEl, kickedEl, kickedReasonEl,
      captionClient: null,
      vu: null,
      lastCue: { text: "", clear: true, seq: 0, service: "CC1" },
      base: null, path: null, pc: null, sessionId: null,
      intentionalClose: false,
      reconnectTimer: null, reconnectAttempt: 0
    };
    pane.captionClient = NexVueCaptions.connect((cue) => {
      pane.lastCue = cue;
      NexVueCaptions.renderOverlay(pane.ccEl, pane.lastCue, captionsOn);
    });
    pane.vu = NexVueVu.attach({
      container: videoBox,
      video,
      listen: false,
      layout: "stereo",
      visible: vuOn,
      volume: NexVueVu.getVolumePref(),
    });

    select.addEventListener("change", async () => {
      const val = select.value;
      hidePaneKicked(pane);
      if (!val) {
        closePane(pane, true);
        pane.base = null;
        pane.captionClient.setChannel(null);
        setPaneStatus(pane, "idle");
        empty.classList.remove("hidden");
        if (audioPane === index) selectAudio(-1);
        releaseWakeLockIfIdle();
        return;
      }
      pane.base = val;
      pane.captionClient.setChannel(val);
      await loadChannelMeta();
      if (pane.vu) {
        pane.vu.setLayout(audioLayoutByPath[val] || "51_sap");
        pane.vu.setEmbeds(audioEmbedsByPath[val] || [1, 2, 3, 4, 5, 6, 7, 8]);
      }
      empty.classList.add("hidden");
      acquireWakeLock();
      openPane(pane);
    });
    select.addEventListener("click", e => e.stopPropagation());

    el.addEventListener("click", () => {
      if (pane.base) selectAudio(index);
    });

    panes.push(pane);
    grid.appendChild(el);
    return pane;
  }

  function setPaneStatus(pane, text, cls) {
    pane.statusEl.textContent = text;
    pane.statusEl.className = "pane-status" + (cls ? " " + cls : "");
  }

  function closePane(pane, intentional) {
    pane.intentionalClose = intentional;
    // Only clear reconnect when intentionally stopping; heal paths schedule
    // after close. openPane clears the timer when starting a new attempt.
    if (intentional && pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    if (pane.pc) {
      pane.pc.close();
      pane.pc = null;
    }
    pane.video.srcObject = null;
    if (pane.vu) {
      pane.vu.setListen(false, { persist: false });
      pane.vu.setStream(null);
    }
    pane.path = null;
    pane.sessionId = null;
    pane.video.muted = true;
  }

  function parseWhepSessionId(res) {
    // MediaMTX WHEP POST exposes ID (API session uuid) and Location (.../whep/<secret>).
    // Kick registry / Metrics use the API uuid — Location's secret must not be used.
    const idHdr = res.headers.get("ID") || res.headers.get("id") || "";
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(idHdr)) {
      return idHdr;
    }
    return null;
  }

  function decodeKickReason(s) {
    return String(s)
      .replace(/&quot;/g, '"')
      .replace(/&#039;/g, "'")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&amp;/g, "&");
  }

  function hidePaneKicked(pane) {
    pane.kickedEl.hidden = true;
    pane.kickedReasonEl.textContent = "";
  }

  function showPaneKicked(pane, reason) {
    pane.kickedReasonEl.textContent = decodeKickReason(reason || "");
    pane.kickedReasonEl.hidden = !pane.kickedReasonEl.textContent;
    pane.kickedEl.hidden = false;
    emptyHidden(pane, true);
  }

  async function checkKicked(sessionId) {
    const q = new URLSearchParams({ action: "kick_check" });
    if (sessionId) q.set("session_id", sessionId);
    const res = await fetch(`nexvue-ops.php?${q}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return { kicked: !!data.kicked, reason: data.reason || "" };
  }

  function applyPaneKicked(pane, reason) {
    pane.intentionalClose = true;
    if (pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    closePane(pane, true);
    showPaneKicked(pane, reason);
    setPaneStatus(pane, "kicked by administrator", "bad");
    updateGlobalState();
  }

  function scheduleReconnect(pane, reason) {
    if (pane.intentionalClose || pane.reconnectTimer || !pane.base) return;
    pane.reconnectAttempt++;
    const hint = reason ? `${reason} — ` : "";
    setPaneStatus(
      pane,
      `${hint}retry in ${RECONNECT_MS / 1000}s…`,
      "bad"
    );
    pane.reconnectTimer = setTimeout(() => {
      pane.reconnectTimer = null;
      if (pane.intentionalClose || !pane.base) return;
      setPaneStatus(pane, `reconnecting…`, "bad");
      openPane(pane);
    }, RECONNECT_MS);
  }

  async function maybeReconnectPane(pane, reason) {
    if (pane.intentionalClose || !pane.base) return;
    const sid = pane.sessionId;
    try {
      const result = await checkKicked(sid);
      if (result.kicked) {
        applyPaneKicked(pane, result.reason);
        return;
      }
    } catch (e) { /* heal as usual */ }
    scheduleReconnect(pane, reason);
  }

  function restoreFullscreenIfNeeded() {
    if (!preferFullscreen) return;
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) return;
    if (fsRestoreTimer) return;
    fsRestoreTimer = setTimeout(() => {
      fsRestoreTimer = null;
      if (!preferFullscreen) return;
      const still = document.fullscreenElement || document.webkitFullscreenElement;
      if (still) return;
      try {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el).catch(() => { /* gesture policy */ });
      } catch (e) { /* unsupported */ }
    }, 100);
  }

  async function openPane(pane) {
    if (!pane.base) return;
    if (pane.reconnectTimer) {
      clearTimeout(pane.reconnectTimer);
      pane.reconnectTimer = null;
    }
    closePane(pane, false);
    pane.intentionalClose = false;
    hidePaneKicked(pane);
    const path = pathFor(pane.base);
    pane.path = path;
    setPaneStatus(pane, `connecting…`);
    emptyHidden(pane, true);

    const url = `${whepBase()}/${path}/whep`;
    const pc = new RTCPeerConnection();
    pane.pc = pc;
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });
    pc.ontrack = ev => {
      try { ev.receiver.playoutDelayHint = 0; } catch (e) { /* unsupported */ }
      try { ev.receiver.jitterBufferTarget = 0; } catch (e) { /* unsupported */ }
      if (!pane.video.srcObject) pane.video.srcObject = ev.streams[0];
      // Always mute the element — audible pane uses Web Audio (VU solo/mix).
      pane.video.muted = true;
      if (pane.vu && ev.streams[0]) {
        const layout = audioLayoutByPath[pane.base] || "51_sap";
        const embeds = audioEmbedsByPath[pane.base] || [1, 2, 3, 4, 5, 6, 7, 8];
        pane.vu.setStream(ev.streams[0], layout, embeds);
        pane.vu.setVolume(NexVueVu.getVolumePref(), { persist: false });
        pane.vu.setListen(!userMuted && audioPane === pane.index, { persist: false });
      }
    };
    pc.onconnectionstatechange = () => {
      if (!pane.pc || pane.pc !== pc) return;
      if (pc.connectionState === "connected") {
        setPaneStatus(pane, path, "ok");
        pane.reconnectAttempt = 0;
        restoreFullscreenIfNeeded();
        updateGlobalState();
      } else if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
        setPaneStatus(pane, pc.connectionState, "bad");
        if (!pane.intentionalClose && pane.base) {
          maybeReconnectPane(pane, pc.connectionState);
        }
        updateGlobalState();
      }
    };

    try {
      const offer = await pc.createOffer();
      // Chrome won't advertise multiopus; MediaMTX rejects >2ch Opus without it.
      const prepared = await NexVueVu.prepareWhepOffer(offer);
      await pc.setLocalDescription({ type: "offer", sdp: prepared.sdp });
      await new Promise(resolve => {
        if (pc.iceGatheringState === "complete") return resolve();
        const check = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", check);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", check);
        setTimeout(resolve, 2000);
      });
      if (pane.pc !== pc) return;  // superseded

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/sdp" },
        body: pc.localDescription.sdp
      });
      const body = await res.text();
      if (!res.ok) {
        let detail = "";
        try {
          const j = JSON.parse(body);
          if (j && j.error) detail = j.error;
        } catch (e) {
          detail = (body || "").slice(0, 160);
        }
        throw new Error(
          `WHEP ${res.status}` +
          (detail ? ` — ${detail}` : "") +
          (!prepared.multiopus
            ? " (this browser may not support multichannel Opus; use Chrome/Edge)"
            : "")
        );
      }
      pane.sessionId = parseWhepSessionId(res);
      await pc.setRemoteDescription({ type: "answer", sdp: body });
    } catch (err) {
      const msg = err && err.message ? err.message : String(err);
      setPaneStatus(pane, `error: ${msg}`, "bad");
      const sid = pane.sessionId;
      closePane(pane, false);
      pane.sessionId = sid; // preserve for kick_check IP/session lookup on heal
      if (pane.base) maybeReconnectPane(pane, `error: ${msg}`);
      updateGlobalState();
    }
  }

  function emptyHidden(pane, hide) {
    pane.empty.classList.toggle("hidden", hide);
  }

  function selectAudio(index) {
    audioPane = index;
    panes.forEach((p, i) => {
      p.el.classList.toggle("audio-active", i === index && !!p.base);
      p.video.muted = true;
    });
    applyListenAll();
    if (index >= 0) NexVueVu.resume();
    resetRtcBaseline();
    updateFocusLabel();
  }

  function focusedPane() {
    if (audioPane >= 0) {
      const p = panes[audioPane];
      if (p && p.base && p.pc) return p;
    }
    return panes.find(p => p.base && p.pc) || null;
  }

  function resetRtcBaseline() {
    prevBytes = 0;
    prevTs = 0;
    prevLost = 0;
    prevRecv = 0;
    haveLossBaseline = false;
  }

  function clearSessionStats() {
    for (const id of ["s-res", "s-vbr", "s-rtt", "s-jb", "s-loss", "s-drop",
                      "s-viewers", "s-chout", "s-input", "s-ref"]) {
      const el = $(id);
      if (el) {
        el.textContent = "—";
        el.style.color = "";
      }
    }
  }

  function updateFocusLabel() {
    const p = focusedPane();
    const hint = $("stats-focus-hint");
    if (!p) {
      $("s-focus").textContent = "—";
      $("s-rend").textContent = rendition.toUpperCase();
      if (hint) hint.textContent = "";
      clearSessionStats();
      statsFocusIndex = -1;
      return;
    }
    const label = p.select.options[p.select.selectedIndex]?.textContent || p.base;
    $("s-focus").textContent = `Pane ${p.index + 1} · ${label}`;
    $("s-rend").textContent = `${rendition.toUpperCase()} · ${p.path || pathFor(p.base)}`;
    if (hint) hint.textContent = `(pane ${p.index + 1})`;
  }

  async function pollRtcStats() {
    const pane = focusedPane();
    updateFocusLabel();
    if (!pane || !pane.pc) {
      clearSessionStats();
      statsFocusIndex = -1;
      return;
    }
    if (pane.index !== statsFocusIndex) {
      resetRtcBaseline();
      statsFocusIndex = pane.index;
    }
    let report;
    try {
      report = await pane.pc.getStats();
    } catch {
      return;
    }
    report.forEach(s => {
      if (s.type === "inbound-rtp" && s.kind === "video") {
        $("s-res").textContent =
          (s.frameWidth ? `${s.frameWidth}x${s.frameHeight}` : "—") +
          (s.framesPerSecond ? ` @ ${s.framesPerSecond}` : "");
        if (prevTs && s.timestamp > prevTs) {
          const mbps = (s.bytesReceived - prevBytes) * 8 / (s.timestamp - prevTs) / 1000;
          $("s-vbr").textContent = `${mbps.toFixed(2)} Mbps`;
        }
        prevBytes = s.bytesReceived;
        prevTs = s.timestamp;

        const lost = s.packetsLost ?? 0, recv = s.packetsReceived ?? 0;
        if (haveLossBaseline) {
          const dLost = Math.max(0, lost - prevLost);
          const dRecv = Math.max(0, recv - prevRecv);
          const total = dLost + dRecv;
          const lossRate = total > 0 ? dLost / total : 0;
          $("s-loss").textContent = `${(lossRate * 100).toFixed(1)} %`;
        }
        prevLost = lost;
        prevRecv = recv;
        haveLossBaseline = true;

        $("s-drop").textContent = s.framesDropped ?? "—";
        if (s.jitterBufferDelay && s.jitterBufferEmittedCount) {
          const ms = s.jitterBufferDelay / s.jitterBufferEmittedCount * 1000;
          $("s-jb").textContent = `${ms.toFixed(0)} ms`;
        }
      }
      if (s.type === "candidate-pair" && s.state === "succeeded" && s.nominated &&
          s.currentRoundTripTime !== undefined) {
        $("s-rtt").textContent = `${(s.currentRoundTripTime * 1000).toFixed(1)} ms`;
      }
    });
  }

  async function pollApiStats() {
    const pane = focusedPane();
    const base = serviceBase("api");
    try {
      const res = await fetch(`${base}/v3/paths/list`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      const now = performance.now();
      const perPath = {};
      let total = 0;
      for (const p of data.items || []) {
        perPath[p.name] = p.bytesSent || 0;
        total += p.bytesSent || 0;
        if (pane && pane.path && p.name === pane.path) {
          $("s-viewers").textContent = (p.readers || []).length;
        }
      }
      if (!pane || !pane.path) $("s-viewers").textContent = "—";

      if (prevApi) {
        const dt = (now - prevApi.t) / 1000;
        if (dt > 0) {
          if (pane && pane.path && perPath[pane.path] !== undefined &&
              prevApi.perPath[pane.path] !== undefined) {
            const mbps = (perPath[pane.path] - prevApi.perPath[pane.path]) * 8 / dt / 1e6;
            $("s-chout").textContent = `${mbps.toFixed(2)} Mbps`;
          } else if (!pane) {
            $("s-chout").textContent = "—";
          }
          const allMbps = (total - prevApi.total) * 8 / dt / 1e6;
          $("s-allout").textContent = `${allMbps.toFixed(2)} Mbps`;
        }
      }
      prevApi = { t: now, perPath, total };
    } catch {
      $("s-viewers").textContent = "n/a";
      $("s-chout").textContent = "n/a";
      $("s-allout").textContent = "n/a";
    }
  }

  async function pollInputStatus() {
    const pane = focusedPane();
    try {
      const res = await fetch("nexvue-status.php");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const byIndex = {};
      for (const d of data.devices || []) byIndex[d.index] = d;

      if (!pane || !pane.base) {
        $("s-input").textContent = "—";
        $("s-input").style.color = "";
        $("s-ref").textContent = "—";
        $("s-ref").style.color = "";
        return;
      }
      const idx = parseInt(pane.base.replace(/\D/g, ""), 10);
      const d = byIndex[idx];
      if (data.error && (!data.devices || !data.devices.length)) {
        $("s-input").textContent = `status error: ${data.error}`;
        $("s-input").style.color = "var(--bad)";
        $("s-ref").textContent = "n/a";
        $("s-ref").style.color = "var(--dim)";
        return;
      }
      if (data.stale) {
        $("s-input").textContent = d
          ? `${d.input_locked ? d.input_mode : "NO SIGNAL"} (stale)`
          : "stale";
        $("s-input").style.color = "var(--dim)";
        $("s-ref").textContent = d
          ? (d.reference_locked ? `locked · ${d.reference_mode}` : "free-run")
          : "—";
        $("s-ref").style.color = "var(--dim)";
      } else if (d) {
        $("s-input").textContent = d.input_locked ? d.input_mode : "NO SIGNAL";
        $("s-input").style.color = d.input_locked ? "" : "var(--bad)";
        $("s-ref").textContent = d.reference_locked
          ? `locked · ${d.reference_mode}` : "free-run";
        $("s-ref").style.color = d.reference_locked ? "" : "var(--dim)";
      } else {
        $("s-input").textContent = "—";
        $("s-input").style.color = "";
        $("s-ref").textContent = "—";
        $("s-ref").style.color = "";
      }
    } catch {
      $("s-input").textContent = "status unreachable";
      $("s-input").style.color = "var(--bad)";
      $("s-ref").textContent = "n/a";
      $("s-ref").style.color = "var(--dim)";
    }
  }

  function reconnectAllActive() {
    panes.forEach(p => {
      if (p.base) openPane(p);
    });
  }

  function updateGlobalState() {
    const active = panes.filter(p => p.base);
    if (active.length === 0) {
      setGlobalState("idle");
      return;
    }
    const bad = active.filter(p => p.statusEl.classList.contains("bad"));
    const ok = active.filter(p => p.statusEl.classList.contains("ok"));
    if (bad.length) setGlobalState(`${ok.length}/${active.length} connected`, "bad");
    else if (ok.length === active.length) setGlobalState(`${ok.length} connected`, "ok");
    else setGlobalState(`connecting ${ok.length}/${active.length}…`);
  }

  function applyLayout(mode) {
    layout = mode;
    grid.className = mode;
    $("layout-dual").classList.toggle("active", mode === "dual");
    $("layout-quad").classList.toggle("active", mode === "quad");
    panes.forEach((p, i) => {
      const visible = mode === "quad" || i < 2;
      p.el.classList.toggle("hidden", !visible);
      if (!visible && p.base) {
        // Tear down hidden panes so we don't keep unused WHEP sessions.
        closePane(p, true);
        p.base = null;
        p.captionClient.setChannel(null);
        p.select.value = "";
        emptyHidden(p, false);
        setPaneStatus(p, "idle");
        if (audioPane === i) selectAudio(-1);
      }
    });
    updateGlobalState();
    releaseWakeLockIfIdle();
  }

  function setRendition(rend) {
    if (rend === rendition) return;
    rendition = rend;
    $("q-hi").classList.toggle("active", rend === "hi");
    $("q-lo").classList.toggle("active", rend === "lo");
    resetRtcBaseline();
    updateFocusLabel();
    reconnectAllActive();
  }

  // ---- Controls ---------------------------------------------------------------
  $("layout-dual").addEventListener("click", () => applyLayout("dual"));
  $("layout-quad").addEventListener("click", () => applyLayout("quad"));
  $("q-hi").addEventListener("click", () => setRendition("hi"));
  $("q-lo").addEventListener("click", () => setRendition("lo"));

  $("fs").addEventListener("click", () => {
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      (document.documentElement.requestFullscreen ||
       document.documentElement.webkitRequestFullscreen).call(document.documentElement);
    }
  });
  for (const ev of ["fullscreenchange", "webkitfullscreenchange"]) {
    document.addEventListener(ev, () => {
      const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      preferFullscreen = !!fsEl;
    });
  }

  for (let i = 0; i < PANE_COUNT; i++) createPane(i);
  applyLayout("quad");
  setInterval(pollRtcStats, 1000);
  setInterval(pollApiStats, 2000);
  setInterval(pollInputStatus, 2000);
  pollApiStats();
  pollInputStatus();
  updateFocusLabel();
  if (!("wakeLock" in navigator)) setWakeStat("unsupported", "var(--dim)");

  // ---- Session metrics drawer -------------------------------------------------
  const TIP_DELAY_MS = 2000;
  const tipEl = $("stat-tip");
  let tipTimer = null;
  let tipAnchor = null;

  function hideStatTip() {
    if (tipTimer) { clearTimeout(tipTimer); tipTimer = null; }
    tipAnchor = null;
    tipEl.classList.remove("visible");
    tipEl.setAttribute("aria-hidden", "true");
    tipEl.textContent = "";
  }

  function placeStatTip(el) {
    const text = el.getAttribute("data-tip");
    if (!text) return;
    tipEl.textContent = text;
    tipEl.classList.add("visible");
    tipEl.setAttribute("aria-hidden", "false");
    const r = el.getBoundingClientRect();
    const pad = 8;
    const tw = tipEl.offsetWidth;
    const th = tipEl.offsetHeight;
    let left = r.left + (r.width - tw) / 2;
    left = Math.max(pad, Math.min(left, window.innerWidth - tw - pad));
    let top = r.top - th - 6;
    if (top < pad) top = r.bottom + 6;
    tipEl.style.left = `${Math.round(left)}px`;
    tipEl.style.top = `${Math.round(top)}px`;
  }

  function scheduleStatTip(el) {
    if (tipAnchor === el && tipEl.classList.contains("visible")) return;
    hideStatTip();
    tipAnchor = el;
    tipTimer = setTimeout(() => {
      tipTimer = null;
      if (tipAnchor === el) placeStatTip(el);
    }, TIP_DELAY_MS);
  }

  document.querySelectorAll("#stats .stat[data-tip]").forEach((el) => {
    el.addEventListener("mouseenter", () => scheduleStatTip(el));
    el.addEventListener("mouseleave", () => { if (tipAnchor === el) hideStatTip(); });
    el.addEventListener("focus", () => scheduleStatTip(el));
    el.addEventListener("blur", () => { if (tipAnchor === el) hideStatTip(); });
  });
  window.addEventListener("scroll", () => { if (tipEl.classList.contains("visible")) hideStatTip(); }, true);
  window.addEventListener("resize", hideStatTip);

  const drawer = $("stats-drawer");
  const toggle = $("stats-toggle");
  function setDrawerOpen(open) {
    drawer.classList.toggle("open", open);
    toggle.setAttribute("aria-expanded", open ? "true" : "false");
    try { sessionStorage.setItem("nexvue-mv-stats-drawer", open ? "1" : "0"); } catch { /* private mode */ }
    if (!open) hideStatTip();
  }
  toggle.addEventListener("click", () => setDrawerOpen(!drawer.classList.contains("open")));
  try {
    if (sessionStorage.getItem("nexvue-mv-stats-drawer") === "1") setDrawerOpen(true);
  } catch { /* default closed */ }

  // Keep the control bar's left edge glued to the centered grid.
  (function syncBarToGrid() {
    const stage = document.querySelector(".stage");
    const bar = document.querySelector(".bar");
    if (!stage || !bar || !grid) return;
    function sync() {
      const gr = grid.getBoundingClientRect();
      const sr = stage.getBoundingClientRect();
      bar.style.width = gr.width + "px";
      bar.style.marginLeft = Math.max(0, gr.left - sr.left) + "px";
      bar.style.marginRight = "auto";
    }
    new ResizeObserver(sync).observe(grid);
    window.addEventListener("resize", sync);
    sync();
  })();

  // Friendly labels + AUDIO_LAYOUT / AUDIO_EMBEDS from ops API when available.
  async function loadChannelMeta() {
    try {
      const res = await fetch("nexvue-ops.php?action=aliases", { cache: "no-store" });
      const data = await res.json();
      if (!data || !data.ok || !data.aliases) return;
      if (data.audio_layouts) {
        audioLayoutByPath = data.audio_layouts;
      } else if (data.audio_channels) {
        audioLayoutByPath = {};
        Object.keys(data.audio_channels).forEach((k) => {
          audioLayoutByPath[k] = NexVueVu.normalizeLayout(data.audio_channels[k]);
        });
      }
      if (data.audio_embeds) audioEmbedsByPath = data.audio_embeds;
      panes.forEach(p => {
        [...p.select.options].forEach(opt => {
          if (!opt.value) return;
          const label = data.aliases[opt.value] || data.aliases[opt.value.replace(/\D/g, "")];
          if (label) opt.textContent = label === opt.value ? opt.value : `${label} (${opt.value})`;
        });
        if (p.base && p.vu) {
          p.vu.setLayout(audioLayoutByPath[p.base] || "51_sap");
          p.vu.setEmbeds(audioEmbedsByPath[p.base] || [1, 2, 3, 4, 5, 6, 7, 8]);
        }
      });
    } catch { /* optional */ }
  }
  loadChannelMeta();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") loadChannelMeta();
  });

  function sharePageUrl() {
    const path = location.pathname || "/multiview.html";
    const search = location.search || "";
    return `${location.origin}${path}${search}`;
  }
  const qrModal = $("qr-modal");
  function openQr() {
    const url = sharePageUrl();
    $("qr-url").textContent = url;
    try { NexVUEQR.render($("qr-canvas"), url, { scale: 6, margin: 2 }); }
    catch (err) {
      console.warn("QR render failed:", err);
      $("qr-url").textContent = `${url}\n(QR unavailable: ${err.message})`;
    }
    qrModal.hidden = false;
    qrModal.classList.add("open");
  }
  function closeQr() {
    qrModal.classList.remove("open");
    qrModal.hidden = true;
  }
  $("brand").addEventListener("click", openQr);
  $("qr-close").addEventListener("click", closeQr);
  qrModal.addEventListener("click", (e) => { if (e.target === qrModal) closeQr(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && qrModal.classList.contains("open")) closeQr();
  });
  $("qr-copy").addEventListener("click", async () => {
    const url = $("qr-url").textContent.split("\n")[0];
    try {
      await navigator.clipboard.writeText(url);
      $("qr-copy").textContent = "Copied";
      setTimeout(() => { $("qr-copy").textContent = "Copy URL"; }, 1200);
    } catch { prompt("Copy URL:", url); }
  });
})();
</script>
</body>
</html>
