###############################################################################
# MediaMTX configuration — NexVUE edge node (Phase 1)
#
# Ingest:  local GStreamer encoders publish RTSP to 127.0.0.1:8554 (ch0..ch7)
# Egress:  browsers read via WHEP  ->  http://<edge>:8889/<path>/whep
#          built-in test player    ->  http://<edge>:8889/<path>
#
# Phase 1 = LAN test, no TLS, no auth.
# Phase 2/3 items are present but commented, so this file is the single
# source of truth as the project moves forward.
###############################################################################

logLevel: info
logDestinations: [stdout]          # journald captures stdout via systemd

# --- Control API --------------------------------------------------------------
# Phase 1: bound to all interfaces so the test player can poll viewer counts
# and egress bandwidth (/v3/paths/list) from LAN machines. Read-mostly but it
# DOES expose kick/config endpoints — acceptable on a trusted engineering LAN
# only. Phase 3 (DMZ): bind back to 127.0.0.1 and let the portal heartbeat
# relay stats instead; never expose this port to untrusted networks.
api: yes
apiAddress: :9997
apiAllowOrigin: '*'
# The API has its OWN encryption setting, separate from webrtcEncryption
# above — enabling one does not enable the other. Once Apache/the player page
# is HTTPS, this must be enabled too or the browser blocks it (mixed content
# if the page went HTTPS-only, or ERR_SSL_PROTOCOL_ERROR if the browser is
# probing HTTPS here directly). Same cert/key as the WHEP listener.
apiEncryption: yes
apiServerKey: /etc/nexvue/tls/privkey.pem
apiServerCert: /etc/nexvue/tls/fullchain.pem

# --- Disable everything we don't use -----------------------------------------
hls: no
rtmp: no
srt: no
webrtcICEServers2: []              # no STUN/TURN needed; edge is directly reachable

# --- RTSP ingest (encoders only; never exposed off-box) ----------------------
rtsp: yes
rtspTransports: [tcp]
rtspAddress: 127.0.0.1:8554

# --- WebRTC / WHEP egress -----------------------------------------------------
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: yes
webrtcServerKey: /etc/nexvue/tls/privkey.pem
webrtcServerCert: /etc/nexvue/tls/fullchain.pem

# Single UDP port for ALL WebRTC media sessions -> one firewall rule in the DMZ
webrtcLocalUDPAddress: :8189
# ICE-TCP fallback for viewers on UDP-hostile networks (hotels, some cellular)
webrtcLocalTCPAddress: :8189

webrtcIPsFromInterfaces: yes
# Phase 3 (DMZ): advertise the public address in ICE candidates, otherwise
# external viewers connect signaling but get no media. #1 NAT gotcha.
# CRITICAL for any client NOT on this box's local subnet: without this, ICE
# candidates only advertise the box's private/LAN address (webrtcIPsFromInterfaces
# below), which off-LAN clients (e.g. a phone on cellular) cannot route to.
# Signaling (TCP: WHEP POST, API, status) succeeds regardless — it's ONLY the
# UDP media (port 8189) that silently fails, producing "connects but no video"
# exactly like TCP-only checks (curl, browser hitting :8889/:9997/:9998) would
# never reveal. Use the real hostname (works with a real TLS cert too, unlike
# a bare IP) rather than the public IP where possible.
webrtcAdditionalHosts: [nexvue-dc.area51consulting.com]

# --- Authentication -----------------------------------------------------------
# Phase 1: internal auth, open. Publishing is safe because RTSP is bound to
# loopback; reading is open by design for LAN testing.
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: publish
      - action: read
      - action: api

# Phase 2: switch to JWT issued by the portal.
# NOTE (design decision deferred): authMethod is global — with `jwt`, the
# local encoders need tokens too. Two clean options when we get there:
#   a) portal issues a long-lived publish-scoped JWT baked into each edge's
#      env files, or
#   b) authMethod: http -> portal endpoint that allows 127.0.0.1 publishers
#      unconditionally and validates viewer JWTs.
# authMethod: jwt
# authJWTJWKS: https://portal.example.com/.well-known/jwks.json
# authJWTClaimKey: mediamtx_permissions

# --- Paths --------------------------------------------------------------------
pathDefaults:
  source: publisher                # only accept pushed streams

paths:
  # chN maps 1:1 to a DeckLink connector (device-number N); chNlo is the
  # optional LO rendition. Regex accepts ch0..ch15(lo) to cover any card
  # (Duo 2 = ch0-3, Quad 2 = ch0-7); unused paths simply never get published.
  # Friendly names/descriptions live in the portal catalog (Phase 2), not
  # here — keeps edge config static across the fleet.
  ~^ch([0-9]|1[0-5])(lo)?$:
